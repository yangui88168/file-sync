<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>龙铭仓库 · 公共与私人空间</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏠</text></svg>">
    <meta http-equiv="Content-Security-Policy"
content="
default-src 'self';
img-src * data:;
style-src 'self' 'unsafe-inline'
          https://cdnjs.cloudflare.com
          https://fonts.googleapis.com;
font-src 'self'
         data:
         https://fonts.gstatic.com
         https://cdnjs.cloudflare.com;
script-src 'self'
           'unsafe-inline'
           https://cdnjs.cloudflare.com;
connect-src 'self'
            https://lmck.yangui88168.workers.dev
            https://cdnjs.cloudflare.com
            https://ajax.cloudflare.com;
">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/blueimp-md5/2.19.0/js/md5.min.js"></script>
    <style>
        :root {
            --bg: #f0f2f5; --card-bg: #ffffff; --text: #1e293b; --text-secondary: #64748b;
            --border: #e2e8f0; --hover: #f1f5f9; --shadow: rgba(0,0,0,0.05);
            --primary: #2563eb; --primary-hover: #1d4ed8; --body-bg-image: none; --body-bg-color: #f0f2f5;
            --scope-public: #2563eb; --scope-private: #8b5cf6; --danger: #dc2626;
        }
        body.dark {
            --bg: #0f172a; --card-bg: #1e293b; --text: #e2e8f0; --text-secondary: #94a3b8;
            --border: #334155; --hover: #1e293b; --shadow: rgba(0,0,0,0.3);
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',Roboto,sans-serif; }
        body { background-image: var(--body-bg-image); background-color: var(--body-bg-color); background-size: cover; background-position: center; height:100vh; display:flex; align-items:center; justify-content:center; overflow:hidden; color:var(--text); transition:background 0.3s; }
        .auth-container { background:var(--card-bg); padding:2rem; border-radius:20px; box-shadow:0 20px 35px var(--shadow); width:420px; max-width:90%; display:flex; flex-direction:column; gap:1rem; }
        .auth-container h1 { text-align:center; color:var(--text); }
        .input-group { display:flex; flex-direction:column; gap:0.3rem; }
        .input-group label { font-weight:500; color:var(--text); }
        .input-group input { padding:0.8rem; border:1px solid var(--border); border-radius:10px; outline:none; transition:border 0.2s; background:var(--card-bg); color:var(--text); }
        .input-group input:focus { border-color:var(--primary); }
        .auth-btn { background:var(--primary); color:#fff; border:none; padding:0.8rem; border-radius:10px; font-weight:600; cursor:pointer; width:100%; font-size:1rem; transition:background 0.2s; }
        .auth-btn:hover { background:var(--primary-hover); }
        .auth-btn.secondary { background:var(--border); color:var(--text); }
        .auth-btn.secondary:hover { background:var(--hover); }
        .auth-btn:disabled { opacity:0.5; cursor:not-allowed; }
        .hidden { display:none !important; }
        .main-container { display:none; width:100%; height:100vh; background:transparent; flex-direction:column; }
        .main-container.active { display:flex; }
        .toolbar { background:var(--card-bg); padding:0.7rem 1.5rem; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border); flex-wrap:wrap; gap:0.5rem; z-index:10; }
        .toolbar-left, .toolbar-right { display:flex; align-items:center; gap:0.5rem; flex-wrap:wrap; }
        .toolbar-btn { background:var(--primary); color:#fff; border:none; padding:0.5rem 1rem; border-radius:8px; cursor:pointer; white-space:nowrap; font-size:0.9rem; transition:background 0.2s; }
        .toolbar-btn:hover { background:var(--primary-hover); }
        .toolbar-btn.outline { background:transparent; color:var(--primary); border:1px solid var(--primary); }
        .toolbar-btn.outline:hover { background:var(--primary); color:#fff; }
        .toolbar-btn:disabled { opacity:0.5; cursor:not-allowed; }
        .scope-switch { display:flex; background:var(--border); border-radius:8px; overflow:hidden; margin-bottom:0.5rem; }
        .scope-tab { flex:1; padding:0.5rem; text-align:center; cursor:pointer; font-size:0.85rem; font-weight:500; color:var(--text-secondary); background:transparent; border:none; transition:0.2s; }
        .scope-tab.active { background:var(--primary); color:white; }
        .scope-tab.private.active { background:var(--scope-private); }
        .content-area { display:flex; flex:1; overflow:hidden; position:relative; }
        .sidebar { width:280px; background:var(--card-bg); border-right:1px solid var(--border); padding:1rem; overflow-y:auto; flex-shrink:0; transition:transform 0.3s; }
        .sidebar-toggle { display:none; background:none; border:none; font-size:1.5rem; cursor:pointer; color:var(--text); padding:0.2rem 0.5rem; }
        .file-view { flex:1; padding:1.5rem; overflow-y:auto; background:transparent; }
        .tree { list-style:none; }
        .folder-item { display:flex; align-items:center; padding:0.4rem; cursor:pointer; border-radius:6px; margin-bottom:2px; color:var(--text); }
        .folder-item:hover { background:var(--hover); }
        .sub-tree { list-style:none; padding-left:1.5rem; display:none; }
        .sub-tree.show { display:block; }
        .file-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:0.75rem; }
        .file-card { background:var(--card-bg); padding:1rem; border-radius:12px; box-shadow:0 2px 6px var(--shadow); cursor:pointer; text-align:center; position:relative; transition:background 0.15s; color:var(--text); }
        .file-card:hover { background:var(--hover); }
        .file-card.selectable { cursor:default; }
        .file-card .check-mark { position:absolute; top:5px; left:8px; width:22px; height:22px; border-radius:4px; border:2px solid var(--primary); background:transparent; display:none; align-items:center; justify-content:center; font-size:0.8rem; color:var(--primary); }
        .file-card.selectable .check-mark { display:flex; }
        .file-card.selected .check-mark { background:var(--primary); color:white; }
        .file-card .del-file { position:absolute; top:5px; right:8px; background:#fee2e2; border:none; border-radius:50%; width:22px; height:22px; display:none; align-items:center; justify-content:center; cursor:pointer; font-size:0.8rem; color:#dc2626; }
        .file-card:hover .del-file { display:flex; }
        .file-card.selectable .del-file { display:none; }
        .folder-actions { display:flex; gap:0.3rem; margin-left:auto; }
        .folder-actions button { background:none; border:none; color:var(--text-secondary); cursor:pointer; padding:0.2rem 0.3rem; border-radius:4px; }
        .folder-actions button:hover { background:var(--hover); color:var(--text); }
        .sub-item { display:flex; align-items:center; padding:0.3rem 0.5rem; cursor:pointer; border-radius:4px; margin-bottom:1px; color:var(--text); }
        .sub-item:hover { background:var(--hover); }
        .sub-item-actions button { background:none; border:none; color:var(--text-secondary); cursor:pointer; padding:0.1rem 0.3rem; border-radius:4px; font-size:0.75rem; }
        .add-sub-btn { background:none; border:none; color:var(--primary); cursor:pointer; padding:0.3rem 0.7rem; font-size:0.85rem; border-radius:6px; display:flex; align-items:center; gap:0.3rem; margin-top:0.2rem; width:100%; }
        .add-sub-btn:hover { background:var(--hover); }
        .search-box { width:100%; padding:0.5rem; border:1px solid var(--border); border-radius:8px; margin-bottom:0.5rem; outline:none; background:var(--card-bg); color:var(--text); }
        .search-results { background:var(--card-bg); border:1px solid var(--border); border-radius:8px; max-height:200px; overflow-y:auto; margin-bottom:0.5rem; }
        .search-result-item { padding:0.4rem 0.6rem; cursor:pointer; border-bottom:1px solid var(--border); font-size:0.8rem; }
        .search-result-item:hover { background:var(--hover); }
        .search-result-item .path { color:var(--text-secondary); font-size:0.7rem; }
        .modal-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:none; justify-content:center; align-items:center; z-index:1000; }
        .modal-overlay.open { display:flex; }
        .modal-content { background:var(--card-bg); border-radius:16px; padding:2rem; width:600px; max-width:90%; max-height:80vh; overflow-y:auto; position:relative; }
        .modal-content h3 { margin-bottom:1rem; color:var(--text); }
        .modal-content textarea { width:100%; height:300px; padding:0.5rem; border:1px solid var(--border); border-radius:8px; font-family:monospace; outline:none; resize:vertical; background:var(--card-bg); color:var(--text); }
        .progress-container { width:100%; background:var(--border); border-radius:10px; height:12px; margin:0.5rem 0; display:none; }
        .progress-bar { height:100%; background:var(--primary); border-radius:10px; width:0%; transition:width 0.2s; }
        .upload-status { font-size:0.8rem; color:var(--text-secondary); margin-bottom:0.25rem; }
        .loading-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.6); display:none; justify-content:center; align-items:center; z-index:2000; }
        .loading-overlay.active { display:flex; }
        .spinner { border:4px solid var(--border); border-top:4px solid var(--primary); border-radius:50%; width:40px; height:40px; animation:spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform:rotate(0deg); } 100% { transform:rotate(360deg); } }
        .avatar-img { width:38px; height:38px; border-radius:50%; object-fit:cover; cursor:pointer; }
        .avatar-img-large { width:60px; height:60px; border-radius:50%; object-fit:cover; }
        .settings-icon { background:none; border:none; cursor:pointer; width:48px; height:48px; display:flex; align-items:center; justify-content:center; border-radius:12px; color:var(--text); font-size:1.5rem; }
        .settings-icon:hover { background:var(--hover); }
        .toast { position:fixed; top:20px; right:20px; background:var(--danger); color:white; padding:0.8rem 1.2rem; border-radius:8px; z-index:3000; opacity:0; transition:opacity 0.3s; }
        .toast.show { opacity:1; }
        @media (max-width:768px) { .sidebar { width:260px; position:absolute; z-index:10; height:100%; transform:translateX(-100%); } .sidebar.open { transform:translateX(0); } .sidebar-toggle { display:block; } .toolbar { padding:0.5rem; } }
        mark { background:#fef08a; padding:0 2px; border-radius:2px; }
    </style>
</head>
<body>
    <!-- 登录面板 -->
    <div id="loginPanel" class="auth-container">
        <h1>🏠 龙铭仓库</h1>
        <div id="loginStep1">
            <div class="input-group"><label>用户名或邮箱</label><input type="text" id="loginUsername" autocomplete="username"></div>
            <div class="input-group"><label>密码</label><input type="password" id="loginPassword" autocomplete="current-password"></div>
            <button class="auth-btn" id="loginNextBtn">下一步</button>
            <div style="text-align:center;margin-top:0.5rem;"><a id="goRegister" style="cursor:pointer;color:var(--primary);font-size:0.9rem;">注册新账号</a></div>
        </div>
        <div id="loginStep2" class="hidden">
            <div style="text-align:center;padding:0.5rem 0;">账号 <strong id="loginAccountDisplay"></strong></div>
            <div class="input-group"><label>二级密码（6位数字）</label><input type="password" id="loginSecondPwd" maxlength="6" inputmode="numeric"></div>
            <button class="auth-btn" id="loginConfirmBtn">登录</button>
            <button class="auth-btn secondary" id="loginBackBtn">返回上一步</button>
        </div>
    </div>

    <!-- 注册面板 -->
    <div id="registerPanel" class="auth-container" style="display:none;">
        <h1>注册龙铭仓库</h1>
        <div class="input-group"><label>用户名（4-20字符）</label><input type="text" id="regUsername"></div>
        <div class="input-group"><label>邮箱（可选）</label><input type="email" id="regEmail"></div>
        <div class="input-group"><label>密码（至少6位）</label><input type="password" id="regPassword"></div>
        <div class="input-group"><label>确认密码</label><input type="password" id="regConfirmPwd"></div>
        <div class="input-group"><label>二级密码（6位数字）</label><input type="password" id="regSecondPwd" maxlength="6" inputmode="numeric"></div>
        <div class="input-group"><label>确认二级密码</label><input type="password" id="regConfirmSecondPwd" maxlength="6" inputmode="numeric"></div>
        <div class="input-group"><label>邀请码</label><input type="text" id="inviteCode"></div>
        <button class="auth-btn" id="registerBtn">注册</button>
        <div style="text-align:center;"><a id="goLogin" style="cursor:pointer;color:var(--primary);font-size:0.9rem;">返回登录</a></div>
    </div>

    <!-- 主界面 -->
    <div id="mainPanel" class="main-container">
        <div class="toolbar">
            <div class="toolbar-left">
                <button class="sidebar-toggle" id="sidebarToggle"><i class="fas fa-bars"></i></button>
                <img id="avatarImg" class="avatar-img" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%23ddd'/%3E%3C/svg%3E" title="个人主页" onclick="window._openProfile()" />
                <button class="toolbar-btn" id="uploadBtn" onclick="window._triggerUpload()"><i class="fas fa-upload"></i> 上传</button>
                <button class="toolbar-btn outline" id="downloadBtn" onclick="window._downloadAction()"><i class="fas fa-download"></i> 下载</button>
                <button class="toolbar-btn outline" id="refreshBtn" onclick="window._refresh()"><i class="fas fa-sync-alt"></i> 刷新</button>
                <button class="toolbar-btn outline" id="trashBtn" onclick="window._toggleTrash()"><i class="fas fa-trash"></i> 回收站</button>
                <button class="toolbar-btn outline" id="exportStructureBtn" onclick="window._exportStructure()" title="仅导出目录结构"><i class="fas fa-file-export"></i> 导出结构</button>
            </div>
            <div class="toolbar-right">
                <button class="settings-icon" id="settingsBtn" onclick="window._openSettings()" title="设置"><i class="fas fa-cog"></i></button>
            </div>
        </div>
        <div class="content-area">
            <div class="sidebar" id="sidebar">
                <div class="scope-switch">
                    <button class="scope-tab active" data-scope="public" onclick="window._switchScope('public')">🌐 公共资料</button>
                    <button class="scope-tab private" data-scope="private" onclick="window._switchScope('private')">🔒 我的空间</button>
                </div>
                <input type="text" class="search-box" id="searchInput" placeholder="🔍 搜索文件名" autocomplete="off">
                <div id="searchResults" class="search-results hidden"></div>
                <button id="addFolderBtn" class="toolbar-btn" style="margin-bottom:0.75rem;width:100%;" onclick="window._addFolder()">+ 新建文件夹</button>
                <ul class="tree" id="treeRoot"></ul>
                <div id="trashPanel" class="hidden" style="margin-top:1rem;">
                    <hr style="border-color:var(--border);">
                    <h4 style="display:flex;justify-content:space-between;color:var(--text);">回收站 <button id="emptyTrashBtn" class="toolbar-btn outline" style="font-size:0.7rem;padding:0.2rem 0.5rem;" onclick="window._emptyTrash()">清空</button></h4>
                    <ul id="trashList" style="list-style:none;color:var(--text);"></ul>
                </div>
            </div>
            <div class="file-view" id="fileView">
                <h2 style="color:var(--text-secondary);">欢迎使用龙铭仓库</h2>
                <p style="color:var(--text-secondary);">请从左侧选择文件夹和子分类</p>
            </div>
        </div>
        <div class="progress-container" id="progressContainer">
            <div class="upload-status" id="uploadStatus"></div>
            <div class="progress-bar" id="progressBar"></div>
        </div>
    </div>

    <!-- 加载遮罩/Toast -->
    <div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>
    <div class="toast" id="toast"></div>

    <!-- 所有模态框 -->
    <div class="modal-overlay" id="editorModal">
        <div class="modal-content">
            <h3>编辑文件：<span id="editorFileName" style="color:var(--primary);"></span></h3>
            <textarea id="editorTextarea"></textarea>
            <div style="display:flex;gap:1rem;margin-top:1rem;justify-content:flex-end;">
                <button class="auth-btn secondary" id="editorCancel">取消</button>
                <button class="auth-btn" id="editorSave">保存 (Ctrl+S)</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="profileModal">
        <div class="modal-content" style="width:420px;">
            <div style="text-align:center;"><img id="profileAvatarImg" class="avatar-img-large" src="" /><h3 id="profileUsername" style="margin-top:0.5rem;"></h3></div>
            <hr style="border-color:var(--border);margin:1rem 0;">
            <div style="display:flex;flex-direction:column;gap:0.8rem;">
                <div style="display:flex;gap:0.5rem;align-items:center;">
                    <span style="white-space:nowrap;">邀请码：</span>
                    <input type="text" id="myInviteCode" readonly style="flex:1;background:var(--card-bg);border:1px solid var(--border);padding:0.5rem;border-radius:8px;color:var(--text);" />
                    <button class="auth-btn" id="copyInviteBtn" onclick="window._copyInviteCode()" style="width:auto;padding:0.5rem 1rem;">复制</button>
                </div>
                <button class="auth-btn secondary" onclick="window._openPasswordModal()">修改密码</button>
                <button class="auth-btn secondary" onclick="window._openSecondPwdModal()">修改二级密码</button>
                <button class="auth-btn secondary" onclick="window._openUsernameModal()">修改用户名</button>
                <button class="auth-btn secondary" onclick="window._openAvatarModal()">修改头像</button>
            </div>
            <button class="auth-btn secondary" id="closeProfileModal" style="margin-top:1rem;">关闭</button>
        </div>
    </div>

    <div class="modal-overlay" id="passwordSubModal">
        <div class="modal-content" style="width:400px;">
            <h3>修改密码</h3>
            <input type="password" id="oldPassword" placeholder="原密码"><br><br>
            <input type="password" id="newPassword" placeholder="新密码（至少6位）"><br><br>
            <input type="password" id="confirmNewPassword" placeholder="确认新密码"><br><br>
            <button class="auth-btn" onclick="window._updatePassword()">更新密码</button>
            <button class="auth-btn secondary" id="cancelPasswordBtn" style="margin-top:0.5rem;">取消</button>
        </div>
    </div>

    <div class="modal-overlay" id="secondPwdSubModal">
        <div class="modal-content" style="width:400px;">
            <h3>修改二级密码</h3>
            <input type="password" id="oldSecondPwd" placeholder="原二级密码"><br><br>
            <input type="password" id="newSecondPwd" placeholder="新二级密码（6位数字）" maxlength="6"><br><br>
            <input type="password" id="confirmNewSecondPwd" placeholder="确认新二级密码" maxlength="6"><br><br>
            <button class="auth-btn" onclick="window._updateSecondPwd()">更新</button>
            <button class="auth-btn secondary" id="cancelSecondPwdBtn" style="margin-top:0.5rem;">取消</button>
        </div>
    </div>

    <div class="modal-overlay" id="usernameSubModal">
        <div class="modal-content" style="width:400px;">
            <h3>修改用户名</h3>
            <input type="text" id="newUsername" placeholder="新用户名（4-20字符）"><br><br>
            <button class="auth-btn" onclick="window._updateUsername()">更新</button>
            <button class="auth-btn secondary" id="cancelUsernameBtn" style="margin-top:0.5rem;">取消</button>
        </div>
    </div>

    <div class="modal-overlay" id="avatarSubModal">
        <div class="modal-content" style="width:400px;">
            <h3>修改头像</h3>
            <input type="file" id="avatarFileInput" accept="image/*" /><br><br>
            <button class="auth-btn" onclick="window._uploadAvatar()">上传头像</button>
            <div style="margin-top:1rem;">
                <label>或输入图片 URL</label>
                <input type="text" id="avatarUrl" placeholder="https://example.com/avatar.jpg"><br><br>
                <button class="auth-btn" onclick="window._saveAvatarUrl()">保存 URL</button>
                <button class="auth-btn secondary" onclick="window._useGravatar()" style="margin-top:0.5rem;">使用 Gravatar</button>
            </div>
            <button class="auth-btn secondary" id="cancelAvatarBtn" style="margin-top:1rem;">取消</button>
        </div>
    </div>

    <div class="modal-overlay" id="settingsModal">
        <div class="modal-content" style="width:420px;">
            <h3><i class="fas fa-cog"></i> 设置</h3>
            <hr style="border-color:var(--border);margin:1rem 0;">
            <div style="display:flex;flex-direction:column;gap:1rem;">
                <button class="auth-btn secondary" onclick="window._openBgSettings()">更换背景</button>
                <div style="display:flex;justify-content:space-between;align-items:center;">
                    <span>深色模式</span>
                    <button id="themeToggleSettings" class="theme-toggle" onclick="window._toggleTheme()"><i class="fas fa-moon"></i></button>
                </div>
                <button class="auth-btn secondary" onclick="window._logout()">退出登录</button>
            </div>
            <button class="auth-btn secondary" id="closeSettingsModal" style="margin-top:1rem;">关闭</button>
        </div>
    </div>

    <div class="modal-overlay" id="bgSubModal">
        <div class="modal-content" style="width:420px;">
            <h3>更换背景</h3>
            <label>选择预设背景：</label>
            <div style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:1rem;">
                <button class="bg-preset" data-bg="default" style="width:40px;height:40px;border-radius:8px;background:#f0f2f5;border:2px solid var(--border);" onclick="window._setBg('default')"></button>
                <button class="bg-preset" data-bg="gradient1" style="width:40px;height:40px;border-radius:8px;background:linear-gradient(135deg, #667eea 0%, #764ba2 100%);" onclick="window._setBg('gradient1')"></button>
                <button class="bg-preset" data-bg="gradient2" style="width:40px;height:40px;border-radius:8px;background:linear-gradient(135deg, #f093fb 0%, #f5576c 100%);" onclick="window._setBg('gradient2')"></button>
                <button class="bg-preset" data-bg="gradient3" style="width:40px;height:40px;border-radius:8px;background:linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);" onclick="window._setBg('gradient3')"></button>
            </div>
            <div style="border-top:1px solid var(--border);margin-top:1rem;padding-top:1rem;">
                <label>上传背景图片（仅支持 JPG/PNG/WebP，最大2MB）</label>
                <input type="file" id="backgroundUpload" accept="image/*" /><br><br>
                <button class="auth-btn" onclick="window._uploadBackground()">上传背景</button>
                <button class="auth-btn secondary" onclick="window._resetBackground()" style="margin-top:0.5rem;">重置背景</button>
            </div>
            <button class="auth-btn secondary" id="cancelBgBtn" style="margin-top:0.5rem;">取消</button>
        </div>
    </div>

    <div class="modal-overlay" id="previewModal">
        <div class="modal-content" style="text-align:center; background:var(--card-bg);">
            <span id="previewClose" style="position:absolute;right:1rem;top:1rem;cursor:pointer;font-size:1.5rem;color:var(--text);">&times;</span>
            <img id="previewImage" style="max-width:100%;max-height:70vh;" />
        </div>
    </div>

    <input type="file" id="hiddenFileInput" style="display:none;" multiple onchange="window._handleFileSelect(this)">

    <script>
    (function () {
        const API_BASE = 'https://lmck.yangui88168.workers.dev';
        const CHUNK_SIZE = 5 * 1024 * 1024;
        const MAX_FILE_SIZE = 100 * 1024 * 1024;
        const MAX_EDIT_SIZE = 500 * 1024;
        const FETCH_TIMEOUT = 30000;

        const TokenManager = {
            _store: localStorage,
            getToken() { return this._store.getItem('token'); },
            setToken(t) { this._store.setItem('token', t); },
            removeToken() { this._store.removeItem('token'); },
            getPartialToken() { return this._store.getItem('partialToken'); },
            setPartialToken(t) { this._store.setItem('partialToken', t); },
            removePartialToken() { this._store.removeItem('partialToken'); },
            clear() { this.removeToken(); this.removePartialToken(); }
        };

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.classList.add('show');
            clearTimeout(t._timeout);
            t._timeout = setTimeout(() => t.classList.remove('show'), 3000);
        }
        function sanitizeFileName(name) { return name.replace(/[<>:"|?*\\]/g, '').trim(); }
        function validName(name, max = 64) { return name && String(name).trim().length > 0 && String(name).length <= max; }
        function validEmail(email) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email); }

        async function fetchWithTimeout(resource, options = {}, timeout = FETCH_TIMEOUT) {
            const ctrl = new AbortController();
            const id = setTimeout(() => ctrl.abort(), timeout);
            options.signal = ctrl.signal;
            try { const res = await fetch(resource, options); clearTimeout(id); return res; }
            catch (err) { clearTimeout(id); throw err; }
        }

        async function apiCall(path, method='GET', body=null) {
            const token = TokenManager.getToken() || TokenManager.getPartialToken();
            const headers = { 'Content-Type':'application/json' };
            if (token) headers['Authorization'] = `Bearer ${token}`;
            const opts = { method, headers };
            if (body) opts.body = JSON.stringify(body);

            let res;
            try { res = await fetchWithTimeout(API_BASE + path, opts); } catch (err) {
                throw new Error('网络连接失败或请求超时');
            }
            let data;
            try { data = await res.json(); } catch (e) {
                const text = await res.text();
                throw new Error(`服务器响应异常 (${res.status}): ${text.substring(0,100)}`);
            }
            if (!res.ok) throw new Error(data.error || `请求失败 (${res.status})`);
            return data;
        }

        function showLoading(show=true) { document.getElementById('loadingOverlay').classList.toggle('active', show); }

        let currentUser = null;
        let currentScope = 'public';
        let currentSelection = null;
        let fsData = { public: { folders:[], trash:[] }, private: { folders:[], trash:[] } };
        let selectMode = false;
        let selectedFiles = new Set();
        let userBg = localStorage.getItem('userBg') || '';
        let userBgImage = localStorage.getItem('userBgImage') || '';

        function isAdmin() { return currentUser && currentUser.role !== 'readonly'; }

        function updateUIByRole() {
            const canEdit = isAdmin();
            document.getElementById('uploadBtn').disabled = !canEdit;
            document.getElementById('addFolderBtn').disabled = !canEdit;
            const emptyBtn = document.getElementById('emptyTrashBtn');
            if (emptyBtn) emptyBtn.disabled = !canEdit;
        }

        function updateUserUI() {
            if (!currentUser) return;
            document.getElementById('profileUsername').textContent = currentUser.username;
            document.getElementById('myInviteCode').value = currentUser.inviteCode || '';
            document.getElementById('avatarImg').src = currentUser.avatar || 'data:image/svg+xml,...';
            document.getElementById('profileAvatarImg').src = currentUser.avatar || 'data:image/svg+xml,...';
            updateUIByRole();
        }

        function logout() {
            currentUser = null;
            TokenManager.clear();
            document.getElementById('mainPanel').classList.remove('active');
            document.getElementById('loginPanel').style.display = 'flex';
            document.getElementById('loginStep1').classList.remove('hidden');
            document.getElementById('loginStep2').classList.add('hidden');
            showToast('已退出登录');
        }

        async function loadFS() {
            showLoading(true);
            try {
                const data = await apiCall('/get-fs');
                const fsRes = data.data || data;
                fsData = {
                    public: fsRes.public || { folders:[], trash:[] },
                    private: fsRes.private || { folders:[], trash:[] }
                };
                renderTree();
                if (!document.getElementById('trashPanel').classList.contains('hidden')) renderTrash();
                updateUIByRole();
            } finally { showLoading(false); }
        }

        function getCurrentFS() { return currentScope === 'public' ? fsData.public : fsData.private; }

        async function saveFS(container = getCurrentFS()) {
            const ver = container.version || 1;
            try {
                const res = await apiCall('/update-fs', 'PUT', {
                    scope: currentScope,
                    folders: container.folders,
                    trash: container.trash,
                    version: ver
                });
                container.version = (res.data && res.data.version) || res.version;
            } catch (e) {
                if (e.message.includes('冲突') || e.message.includes('修改')) {
                    showToast('文件已被其他用户修改，正在自动刷新...');
                    await loadFS();
                    if (currentSelection) renderFileView(currentSelection.folderId, currentSelection.subId);
                } else showToast(e.message);
            }
        }

        function findFolderObj(id) { return getCurrentFS().folders.find(f => f.id === id); }
        function findSubObj(folderId, subId) {
            const fo = findFolderObj(folderId);
            return fo?.children?.find(c => c.id === subId);
        }

        // ===== 核心删除：API成功后即时修改本地数据并重绘 =====
        async function moveToTrash(type, folderId, subId, fileName) {
            if (!isAdmin()) return showToast('只读账户无法删除');
            const params = { scope: currentScope, type, folderId, subId, fileName };
            if (!params.scope || !params.type || !params.folderId) {
                console.error('参数不完整', params);
                return showToast('删除参数错误，请刷新后重试');
            }
            try {
                await apiCall('/move-to-trash', 'POST', params);
                // 服务器成功，立即更新本地数据结构
                const container = getCurrentFS();
                if (type === 'folder') {
                    const idx = container.folders.findIndex(f => f.id === folderId);
                    if (idx !== -1) {
                        const removed = container.folders.splice(idx, 1)[0];
                        container.trash = container.trash || [];
                        container.trash.push({ type:'folder', folder:removed, deletedAt: Date.now() });
                    }
                } else if (type === 'sub') {
                    const folder = container.folders.find(f => f.id === folderId);
                    if (folder) {
                        const idx = folder.children.findIndex(c => c.id === subId);
                        if (idx !== -1) {
                            const removed = folder.children.splice(idx, 1)[0];
                            container.trash.push({ type:'sub', folderId, folderName:folder.name, subId, subName:removed.name, sub:removed, deletedAt: Date.now() });
                        }
                    }
                } else if (type === 'file') {
                    const folder = container.folders.find(f => f.id === folderId);
                    if (folder) {
                        const sub = folder.children.find(c => c.id === subId);
                        if (sub) {
                            const idx = sub.files.findIndex(f => f.name === fileName);
                            if (idx !== -1) {
                                const removed = sub.files.splice(idx, 1)[0];
                                container.trash.push({ type:'file', folderId, folderName:folder.name, subId, subName:sub.name, file:removed, deletedAt: Date.now() });
                            }
                        }
                    }
                }
                // 立即重绘界面
                renderTree();
                if (currentSelection && currentSelection.folderId && currentSelection.subId) {
                    const subExists = findSubObj(currentSelection.folderId, currentSelection.subId);
                    if (subExists) renderFileView(currentSelection.folderId, currentSelection.subId);
                    else document.getElementById('fileView').innerHTML = '';
                }
                if (!document.getElementById('trashPanel').classList.contains('hidden')) renderTrash();
                showToast('已移入回收站');
            } catch (err) {
                console.error('删除失败:', err);
                if (err.message.includes('不存在') || err.message.includes('404') || err.message.includes('未找到')) {
                    await loadFS();
                    showToast('该文件夹可能已被删除，界面已刷新');
                } else {
                    showToast('删除失败: ' + (err.message || '未知错误'));
                    if (err.message.includes('冲突')) await loadFS();
                }
            }
        }

        function deleteFolderFromDOM(divEl) {
            if (!isAdmin()) return showToast('只读账户无法删除');
            const folderId = divEl.dataset.folderId;
            const name = divEl.querySelector('span span')?.textContent || '文件夹';
            if (!folderId) return showToast('无法获取文件夹ID，请刷新');
            if (!confirm(`删除文件夹【${name}】及其所有内容？将移入回收站。`)) return;
            moveToTrash('folder', folderId);
        }
        function deleteSubFromDOM(liEl) {
            if (!isAdmin()) return showToast('只读账户无法删除');
            const folderId = liEl.dataset.folderId;
            const subId = liEl.dataset.subId;
            const name = liEl.querySelector('span span')?.textContent || '子分类';
            if (!folderId || !subId) return showToast('无法获取ID，请刷新');
            if (!confirm(`删除子分类【${name}】及其所有文件？将移入回收站。`)) return;
            moveToTrash('sub', folderId, subId);
        }
        function deleteFileFromDOM(cardEl, fileName) {
            if (!isAdmin()) return showToast('只读账户无法删除');
            const folderId = cardEl.dataset.folderId;
            const subId = cardEl.dataset.subId;
            if (!folderId || !subId) return showToast('无法获取位置信息，请刷新');
            if (!confirm(`删除文件 ${fileName}？将移入回收站。`)) return;
            moveToTrash('file', folderId, subId, fileName);
        }

        // ===== 目录树渲染 =====
        function escapeHtml(text) { return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;'); }
        function highlightText(text, keyword) {
            if (!keyword) return text;
            const reg = new RegExp(keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
            return text.replace(reg, match => `<mark>${match}</mark>`);
        }

        function renderTree() {
            const tree = document.getElementById('treeRoot'); tree.innerHTML = '';
            const container = getCurrentFS(); if (!container.folders) return;
            const query = document.getElementById('searchInput')?.value?.toLowerCase() || '';
            container.folders.forEach(folder => {
                const li = document.createElement('li');
                const div = document.createElement('div'); div.className = 'folder-item';
                div.dataset.folderId = folder.id;
                const locked = folder.hasPassword && (!folder.children || folder.children.length === 0);
                const chevron = document.createElement('i'); chevron.className = 'fas fa-chevron-right'; chevron.style.cssText = 'margin-right:6px;font-size:0.75rem;';
                const nameSpan = document.createElement('span'); nameSpan.style.flex = '1';
                const icon = document.createElement('i');
                icon.className = locked ? 'fas fa-lock' : 'fas fa-folder';
                icon.style.cssText = `margin-right:6px;color:${locked ? '#f59e0b' : (currentScope === 'public' ? '#2563eb' : '#8b5cf6')};`;
                nameSpan.appendChild(icon);
                const nameText = document.createElement('span');
                nameText.innerHTML = highlightText(escapeHtml(sanitizeFileName(folder.name)), query);
                nameSpan.appendChild(nameText);
                const actions = document.createElement('div'); actions.className = 'folder-actions';
                if (isAdmin()) {
                    const keyBtn = document.createElement('button'); keyBtn.title = '密码';
                    keyBtn.innerHTML = '<i class="fas fa-key"></i>';
                    keyBtn.onclick = e => { e.stopPropagation(); setFolderPassword(folder.id); };
                    const renameBtn = document.createElement('button'); renameBtn.title = '重命名';
                    renameBtn.innerHTML = '<i class="fas fa-edit"></i>';
                    renameBtn.onclick = e => { e.stopPropagation(); renameFolder(folder.id, folder.name); };
                    const delBtn = document.createElement('button'); delBtn.title = '删除';
                    delBtn.innerHTML = '<i class="fas fa-trash-alt"></i>';
                    delBtn.onclick = e => { e.stopPropagation(); deleteFolderFromDOM(div); };
                    actions.appendChild(keyBtn); actions.appendChild(renameBtn); actions.appendChild(delBtn);
                }
                div.appendChild(chevron); div.appendChild(nameSpan); div.appendChild(actions);
                const sub = document.createElement('ul'); sub.className = 'sub-tree';
                if (!locked && folder.children) {
                    folder.children.forEach(child => {
                        const cli = document.createElement('li'); cli.className = 'sub-item';
                        cli.dataset.folderId = folder.id; cli.dataset.subId = child.id;
                        const sn = document.createElement('span'); sn.style.flex='1';
                        const subIcon = document.createElement('i'); subIcon.className = 'fas fa-folder-open'; subIcon.style.cssText = 'margin-right:6px;color:#64748b;font-size:0.85rem;';
                        sn.appendChild(subIcon);
                        const subText = document.createElement('span');
                        subText.innerHTML = highlightText(escapeHtml(sanitizeFileName(child.name)), query);
                        sn.appendChild(subText);
                        const sa = document.createElement('div'); sa.className='sub-item-actions';
                        if (isAdmin()) {
                            const rb = document.createElement('button'); rb.innerHTML = '<i class="fas fa-edit"></i>';
                            rb.onclick = e => { e.stopPropagation(); renameSub(folder.id, child.id, child.name); };
                            const db = document.createElement('button'); db.innerHTML = '<i class="fas fa-trash-alt"></i>';
                            db.onclick = e => { e.stopPropagation(); deleteSubFromDOM(cli); };
                            sa.appendChild(rb); sa.appendChild(db);
                        }
                        cli.appendChild(sn); cli.appendChild(sa);
                        cli.onclick = e => { if (e.target.closest('button')) return; selectSub(folder.id, child.id, cli); };
                        sub.appendChild(cli);
                    });
                    if (isAdmin()) {
                        const addBtn = document.createElement('button'); addBtn.className='add-sub-btn'; addBtn.innerHTML='<i class="fas fa-plus"></i> 新建子分类';
                        addBtn.onclick = e => { e.stopPropagation(); addSubFolder(folder.id); };
                        sub.appendChild(addBtn);
                    }
                }
                div.onclick = async e => {
                    if (e.target.closest('.folder-actions')) return;
                    if (locked) {
                        const pwd = prompt(`请输入文件夹 "${folder.name}" 的密码：`); if (pwd === null) return;
                        try {
                            await apiCall('/verify-folder-password', 'POST', { scope: currentScope, folderId: folder.id, password: pwd });
                            await loadFS();
                        } catch { showToast('密码错误'); }
                    } else { sub.classList.toggle('show'); chevron.classList.toggle('fa-rotate-90'); }
                };
                li.appendChild(div); li.appendChild(sub); tree.appendChild(li);
            });
        }

        function selectSub(folderId, subId, cli) {
            currentSelection = { folderId, subId };
            document.querySelectorAll('.sub-item').forEach(el => el.style.background = '');
            if (cli) cli.style.background = '#dbeafe';
            if (selectMode) toggleSelectMode(false);
            renderFileView(folderId, subId);
            if (window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open');
        }

        // ===== 其他操作函数 =====
        async function setFolderPassword(folderId) {
            const newPwd = prompt(`设置密码（留空=清除）：`); if (newPwd === null) return;
            await apiCall('/set-folder-password', 'POST', { scope: currentScope, folderId, password: newPwd || '' });
            await loadFS();
            showToast(newPwd ? '密码已设置！' : '密码已清除！');
        }
        async function renameFolder(folderId, oldName) {
            if (!isAdmin()) return showToast('只读账户无法重命名');
            const newName = prompt('新文件夹名称：', oldName); if (!newName || !validName(newName)) return;
            await apiCall('/rename-folder', 'POST', { scope: currentScope, folderId, newName });
            const folder = findFolderObj(folderId);
            if (folder) folder.name = newName;
            renderTree();
            if (currentSelection?.folderId === folderId) renderFileView(folderId, currentSelection.subId);
        }
        async function renameSub(folderId, subId, oldName) {
            if (!isAdmin()) return showToast('只读账户无法重命名');
            const newName = prompt('新子分类名：', oldName); if (!newName || !validName(newName)) return;
            await apiCall('/rename-sub', 'POST', { scope: currentScope, folderId, subId, newSub: newName });
            const sub = findSubObj(folderId, subId);
            if (sub) sub.name = newName;
            renderTree();
            if (currentSelection?.folderId === folderId && currentSelection?.subId === subId) renderFileView(folderId, subId);
        }
        async function addSubFolder(folderId) {
            if (!isAdmin()) return showToast('只读账户无法添加');
            const newName = prompt('子分类名称：'); if (!newName || !validName(newName)) return;
            const folder = findFolderObj(folderId); if (!folder) return;
            const newSub = { id: crypto.randomUUID ? crypto.randomUUID() : 'sub_'+Date.now(), name: newName, files: [] };
            folder.children.push(newSub);
            await saveFS();
            renderTree();
        }

        function toggleSelectMode(enable) {
            selectMode = enable;
            const btn = document.getElementById('downloadBtn');
            btn.innerHTML = selectMode ? '<i class="fas fa-check"></i> 确认下载' : '<i class="fas fa-download"></i> 下载';
            document.querySelectorAll('.file-card').forEach(card => {
                if (selectMode) card.classList.add('selectable'); else card.classList.remove('selectable', 'selected');
            });
            selectedFiles.clear();
        }

        function renderFileView(folderId, subId) {
            const child = findSubObj(folderId, subId);
            const fv = document.getElementById('fileView'); fv.innerHTML = '';
            if (!child) {
                const el = document.createElement('h2'); el.style.color = 'var(--text-secondary)'; el.textContent = '未找到该分类';
                fv.appendChild(el); return;
            }
            const folderObj = findFolderObj(folderId);
            const folderName = folderObj ? folderObj.name : folderId;
            const subName = child.name;
            const h2 = document.createElement('h2'); h2.style.cssText = 'margin-bottom:1rem;color:var(--text);';
            h2.innerHTML = `<i class="fas fa-folder-open" style="margin-right:8px;color:var(--primary);"></i>${subName}`;
            fv.appendChild(h2);
            if (isAdmin()) {
                const addBtn = document.createElement('button'); addBtn.className = 'toolbar-btn'; addBtn.style.marginBottom='1rem'; addBtn.textContent='+ 上传文件';
                addBtn.onclick = () => window._triggerUpload();
                fv.appendChild(addBtn);
            }
            if (!child.files.length) {
                fv.appendChild(document.createTextNode('暂无文件，拖拽文件到此处或点击上传'));
                return;
            }
            const grid = document.createElement('div'); grid.className='file-grid';
            child.files.forEach((f, i) => {
                const fileName = sanitizeFileName(f.name);
                const isImage = f.mime?.startsWith('image/');
                const isPDF = f.mime === 'application/pdf';
                let iconClass = 'fa-file-alt';
                if (/\.(png|jpg|jpeg|gif|bmp|svg|webp)$/i.test(fileName) || isImage) iconClass='fa-file-image';
                else if (/\.(mp4|webm|ogg|mov|avi)$/i.test(fileName)) iconClass='fa-file-video';
                else if (/\.(mp3|wav|flac|aac)$/i.test(fileName)) iconClass='fa-file-audio';
                else if (/\.pdf$/i.test(fileName) || isPDF) iconClass='fa-file-pdf';
                const card = document.createElement('div'); card.className='file-card';
                card.dataset.folderId = folderId;
                card.dataset.subId = subId;
                const fileKey = JSON.stringify({ folderId, subId, fileName });
                if (selectMode) { card.classList.add('selectable'); if (selectedFiles.has(fileKey)) card.classList.add('selected'); }
                const checkMark = document.createElement('div'); checkMark.className='check-mark'; checkMark.innerHTML='<i class="fas fa-check"></i>'; card.appendChild(checkMark);
                if (isAdmin()) {
                    const delBtn = document.createElement('button'); delBtn.className='del-file'; delBtn.textContent='×';
                    delBtn.onclick = async e => {
                        e.stopPropagation();
                        deleteFileFromDOM(card, fileName);
                    };
                    card.appendChild(delBtn);
                }
                const icon = document.createElement('i'); icon.className=`fas ${iconClass}`; icon.style.cssText='font-size:2rem;display:block;margin:0 auto 0.5rem;color:var(--primary);';
                const nameEl = document.createElement('span'); nameEl.style.cssText='display:block;word-break:break-all;font-size:0.8rem;color:var(--text);'; nameEl.textContent = fileName;
                card.appendChild(icon); card.appendChild(nameEl);
                if (isAdmin() && /\.(txt|md|json|csv|py|js|html|css|log|xml|yaml)$/i.test(fileName)) {
                    const editBtn = document.createElement('button'); editBtn.textContent='编辑'; editBtn.style.cssText='margin-top:4px;background:none;border:1px solid var(--primary);color:var(--primary);border-radius:4px;padding:2px 8px;font-size:0.78rem;cursor:pointer;';
                    editBtn.onclick = e => { e.stopPropagation(); openEditor(folderName, subName, i, fileName); };
                    card.appendChild(editBtn);
                }
                card.addEventListener('click', e => {
                    if (e.target.closest('button')) return;
                    if (selectMode) {
                        if (selectedFiles.has(fileKey)) { selectedFiles.delete(fileKey); card.classList.remove('selected'); }
                        else { selectedFiles.add(fileKey); card.classList.add('selected'); }
                        return;
                    }
                    if (isImage || isPDF) previewFile(folderName, subName, f);
                    else downloadFile(folderName, subName, f);
                });
                grid.appendChild(card);
            });
            fv.appendChild(grid);
        }

        // ===== 下载/预览 =====
        async function downloadFile(folder, sub, fileObj) {
            try {
                const res = await fetchWithTimeout(`${API_BASE}/download-file?scope=${currentScope}&folder=${encodeURIComponent(folder)}&sub=${encodeURIComponent(sub)}&file=${encodeURIComponent(fileObj.name)}`, {
                    headers: { 'Authorization': `Bearer ${TokenManager.getToken()}` }
                });
                if (!res.ok) throw new Error('下载失败');
                const blob = await res.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = sanitizeFileName(fileObj.name); a.click();
                URL.revokeObjectURL(url);
            } catch(err) { showToast('下载出错: '+err.message); }
        }
        async function downloadSelectedFiles() {
            if (selectedFiles.size === 0) { showToast('未选择任何文件'); return; }
            if (selectedFiles.size > 5 && !confirm(`您选择了 ${selectedFiles.size} 个文件，浏览器可能会阻止多个下载。是否继续？`)) return;
            for (const key of selectedFiles) {
                const { folderId, subId, fileName } = JSON.parse(key);
                const folderObj = findFolderObj(folderId); if (!folderObj) continue;
                const subObj = findSubObj(folderId, subId); if (!subObj) continue;
                const fileObj = subObj.files.find(f => f.name === fileName);
                if (fileObj) await downloadFile(folderObj.name, subObj.name, fileObj);
            }
            toggleSelectMode(false);
            if (currentSelection) renderFileView(currentSelection.folderId, currentSelection.subId);
        }

        async function previewFile(folder, sub, fileObj) {
            try {
                const res = await fetchWithTimeout(`${API_BASE}/download-file?scope=${currentScope}&folder=${encodeURIComponent(folder)}&sub=${encodeURIComponent(sub)}&file=${encodeURIComponent(fileObj.name)}`, {
                    headers: { 'Authorization': `Bearer ${TokenManager.getToken()}` }
                });
                if (!res.ok) throw new Error('预览失败');
                const blob = await res.blob();
                if (fileObj.mime?.startsWith('image/')) {
                    document.getElementById('previewImage').src = URL.createObjectURL(blob);
                    document.getElementById('previewModal').classList.add('open');
                } else showToast('暂不支持预览该文件');
            } catch(e) { showToast('预览失败: ' + e.message); }
        }

        // ===== 编辑 =====
        let editorCurrentSub = null, editorFileName = '';
        async function openEditor(folder, sub, idx, fileName) {
            const res = await fetchWithTimeout(`${API_BASE}/download-file?scope=${currentScope}&folder=${encodeURIComponent(folder)}&sub=${encodeURIComponent(sub)}&file=${encodeURIComponent(fileName)}`, {
                headers: { 'Authorization': `Bearer ${TokenManager.getToken()}` }
            });
            if (!res.ok) { showToast('无法读取: ' + (await res.json()).error); return; }
            const text = await res.text();
            document.getElementById('editorFileName').textContent = fileName;
            document.getElementById('editorTextarea').value = text;
            document.getElementById('editorModal').classList.add('open');
            editorCurrentSub = { folder, sub }; editorFileName = fileName;
        }
        document.getElementById('editorSave').addEventListener('click', async () => {
            const newContent = document.getElementById('editorTextarea').value;
            if (newContent.length > MAX_EDIT_SIZE) { showToast(`内容过大（${(newContent.length/1024).toFixed(1)}KB），限制 ${MAX_EDIT_SIZE/1024}KB`); return; }
            if (!editorCurrentSub) return;
            showLoading(true);
            await apiCall('/edit-file', 'POST', { scope: currentScope, folder: editorCurrentSub.folder, subFolder: editorCurrentSub.sub, fileName: editorFileName, content: newContent });
            document.getElementById('editorModal').classList.remove('open');
            if (currentSelection) renderFileView(currentSelection.folderId, currentSelection.subId);
            showLoading(false);
        });
        document.getElementById('editorCancel').addEventListener('click', () => document.getElementById('editorModal').classList.remove('open'));

        // ===== 上传 =====
        function updateProgress(percent, statusText = '') {
            document.getElementById('progressContainer').style.display = percent > 0 ? 'block' : 'none';
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('uploadStatus').textContent = statusText;
        }
        async function uploadFiles(files) {
            if (!currentSelection) return showToast('请先选择子分类');
            if (!isAdmin()) return showToast('只读账户无法上传');
            const { folderId, subId } = currentSelection;
            const folderName = findFolderObj(folderId)?.name || folderId;
            const subName = findSubObj(folderId, subId)?.name || subId;
            showLoading(true);
            const uploadId = crypto.randomUUID();
            let totalProcessed = 0;
            const totalChunks = files.reduce((sum, file) => sum + Math.ceil(file.size / CHUNK_SIZE), 0);
            try {
                for (const file of files) {
                    const safeName = sanitizeFileName(file.name);
                    if (file.size > MAX_FILE_SIZE) { showToast(`${file.name} 超过100MB限制，已跳过`); continue; }
                    const chunks = Math.ceil(file.size / CHUNK_SIZE);
                    for (let j=0; j<chunks; j++) {
                        const chunk = file.slice(j * CHUNK_SIZE, Math.min((j+1)*CHUNK_SIZE, file.size));
                        const chunkData = await new Promise((res, rej) => {
                            const r = new FileReader();
                            r.onload = () => res(r.result);
                            r.onerror = () => rej(new Error('文件读取失败'));
                            r.readAsDataURL(chunk);
                        });
                        await apiCall('/upload-chunk', 'POST', {
                            scope: currentScope, fileName: safeName, folder: folderName,
                            subFolder: subName, chunkIndex: j, totalChunks: chunks,
                            data: chunkData.split(',')[1], mime: file.type, uploadId
                        });
                        totalProcessed++;
                        updateProgress(Math.round((totalProcessed / totalChunks) * 100),
                            `正在上传 ${files.indexOf(file)+1}/${files.length} 个文件`);
                    }
                }
                updateProgress(0);
                showToast('上传成功');
                await loadFS();
                renderFileView(folderId, subId);
            } catch (e) { showToast('上传失败: ' + (e.message || '未知错误')); }
            finally { updateProgress(0); showLoading(false); }
        }

        // ===== 背景 =====
        function applyBackground() {
            if (userBgImage) {
                document.body.style.setProperty('--body-bg-image', `url(${userBgImage})`);
                document.body.style.setProperty('--body-bg-color', 'transparent');
            } else if (userBg && userBg !== 'default') {
                const gradients = {
                    gradient1:'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
                    gradient2:'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)',
                    gradient3:'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)'
                };
                document.body.style.setProperty('--body-bg-image', gradients[userBg] || 'none');
                document.body.style.setProperty('--body-bg-color', 'transparent');
            } else {
                document.body.style.setProperty('--body-bg-image', 'none');
                document.body.style.setProperty('--body-bg-color', '');
            }
        }

        function renderTrash() {
            const list = document.getElementById('trashList'); list.innerHTML = '';
            const container = getCurrentFS(); if (!container.trash || !container.trash.length) {
                const li = document.createElement('li'); li.style.color = 'var(--text-secondary)'; li.textContent = '回收站为空'; list.appendChild(li);
                return;
            }
            container.trash.forEach((item, index) => {
                const li = document.createElement('li'); li.style.cssText = 'display:flex;justify-content:space-between;align-items:center;padding:0.3rem 0;border-bottom:1px solid var(--border);';
                let label = '';
                if (item.type === 'folder') label = `📁 ${item.name || item.folder?.name || '未知'}`;
                else if (item.type === 'sub') label = `📂 ${item.folderName || '未知'}/${item.subName || item.sub?.name || '未知'}`;
                else if (item.type === 'file') label = `📄 ${item.folderName || '未知'}/${item.subName || '未知'}/${item.file?.name || item.fileName || '未知'}`;
                const span = document.createElement('span'); span.textContent = label;
                li.appendChild(span);
                const actions = document.createElement('span');
                if (isAdmin()) {
                    const restoreBtn = document.createElement('button'); restoreBtn.innerHTML = '<i class="fas fa-undo"></i>'; restoreBtn.title='恢复'; restoreBtn.style.cssText = 'background:none;border:none;cursor:pointer;color:var(--primary);font-size:1rem;';
                    restoreBtn.onclick = async () => { await apiCall('/restore-from-trash','POST',{scope:currentScope, index}); await loadFS(); };
                    const delBtn = document.createElement('button'); delBtn.innerHTML = '<i class="fas fa-trash-alt"></i>'; delBtn.title='彻底删除'; delBtn.style.cssText = 'background:none;border:none;cursor:pointer;color:#dc2626;font-size:1rem;';
                    delBtn.onclick = async () => { if (!confirm('永久删除不可恢复！')) return; await apiCall('/permanent-delete','POST',{scope:currentScope, index}); await loadFS(); };
                    actions.appendChild(restoreBtn); actions.appendChild(delBtn);
                }
                li.appendChild(actions); list.appendChild(li);
            });
        }

        function updateSettingsThemeIcon() { const btn = document.getElementById('themeToggleSettings'); if (btn) btn.innerHTML = document.body.classList.contains('dark') ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>'; }
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (localStorage.getItem('theme')==='dark' || (!localStorage.getItem('theme') && prefersDark)) document.body.classList.add('dark');
        updateSettingsThemeIcon();

        async function initApp() {
            const token = TokenManager.getToken();
            if (!token) { document.getElementById('loginPanel').style.display = 'flex'; return; }
            try {
                const user = await apiCall('/me');
                currentUser = user.data || user;
                updateUserUI();
                document.getElementById('loginPanel').style.display = 'none';
                document.getElementById('mainPanel').classList.add('active');
                await loadFS();
                applyBackground();
            } catch (e) {
                TokenManager.clear();
                document.getElementById('loginPanel').style.display = 'flex';
            }
        }

        // ===== 搜索 =====
        let searchTimer;
        document.getElementById('searchInput').addEventListener('input', () => {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => {
                renderTree();
                const query = document.getElementById('searchInput').value.trim().toLowerCase();
                if (query) searchFiles(query);
                else document.getElementById('searchResults').classList.add('hidden');
            }, 300);
        });

        function searchFiles(query) {
            const panel = document.getElementById('searchResults'); panel.innerHTML = '';
            if (!query) { panel.classList.add('hidden'); return; }
            const container = getCurrentFS();
            const results = [];
            container.folders.forEach(folder => {
                if (folder.hasPassword && folder.children.length === 0) return;
                folder.children?.forEach(sub => {
                    sub.files?.forEach(file => {
                        if (file.name.toLowerCase().includes(query)) results.push({ folderId: folder.id, subId: sub.id, folderName: folder.name, subName: sub.name, fileName: file.name });
                    });
                });
            });
            if (!results.length) {
                const div = document.createElement('div'); div.className = 'search-result-item'; div.style.color = 'var(--text-secondary)'; div.textContent = '无匹配文件';
                panel.appendChild(div); panel.classList.remove('hidden'); return;
            }
            results.forEach(r => {
                const div = document.createElement('div'); div.className = 'search-result-item';
                const nameSpan = document.createElement('span'); nameSpan.innerHTML = `📄 ${highlightText(escapeHtml(r.fileName), query)}`;
                const pathSpan = document.createElement('span'); pathSpan.className = 'path'; pathSpan.textContent = `${r.folderName}/${r.subName}`;
                div.appendChild(nameSpan); div.appendChild(pathSpan);
                div.onclick = () => {
                    const subItem = document.querySelector(`.sub-item[data-folder-id="${r.folderId}"][data-sub-id="${r.subId}"]`);
                    if (subItem) subItem.click();
                    else {
                        currentSelection = { folderId: r.folderId, subId: r.subId };
                        document.querySelectorAll('.sub-item').forEach(el => el.style.background = '');
                        renderFileView(r.folderId, r.subId);
                    }
                    panel.classList.add('hidden');
                };
                panel.appendChild(div);
            });
            panel.classList.remove('hidden');
        }

        // ===== 全局暴露 =====
        window._handleFileSelect = async function(input) { if (!input.files?.length) return; await uploadFiles(Array.from(input.files)); input.value = ''; };
        window._triggerUpload = function() { if (!currentSelection) return showToast('请先选择子分类'); document.getElementById('hiddenFileInput').click(); };
        window._downloadAction = function() { if (!currentSelection) return showToast('请先选择子分类'); if (!selectMode) { toggleSelectMode(true); renderFileView(currentSelection.folderId, currentSelection.subId); } else downloadSelectedFiles(); };
        window._refresh = function() { loadFS(); };
        window._toggleTrash = function() { const p = document.getElementById('trashPanel'); p.classList.toggle('hidden'); if (!p.classList.contains('hidden')) renderTrash(); };
        window._exportStructure = function() { const c = getCurrentFS(); const blob = new Blob([JSON.stringify({ scope: currentScope, folders: c.folders, trash: c.trash }, null, 2)], { type:'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `structure-${currentScope}-${new Date().toISOString().slice(0,10)}.json`; a.click(); };
        window._switchScope = function(scope) { if (scope === currentScope) return; currentScope = scope; document.querySelectorAll('.scope-tab').forEach(t => t.classList.remove('active')); document.querySelector(`.scope-tab[data-scope="${scope}"]`).classList.add('active'); currentSelection = null; if (selectMode) toggleSelectMode(false); loadFS().then(() => { document.getElementById('fileView').innerHTML = ''; document.getElementById('trashPanel').classList.add('hidden'); }); };
        window._addFolder = async function() { if (!isAdmin()) return showToast('只读账户无法创建'); const name = prompt('新文件夹名称：'); if (!name||!validName(name)) return showToast('名称无效'); const c = getCurrentFS(); c.folders.push({ id: crypto.randomUUID(), name, passwordHash:'', passwordSalt:'', children:[] }); renderTree(); try { await saveFS(); } catch(e) { showToast(e.message); } };
        window._emptyTrash = async function() { if (!isAdmin()) return showToast('只读账户无法清空'); if (!confirm('清空回收站将永久删除所有项目，确定？')) return; await apiCall('/empty-trash', 'POST', { scope: currentScope }); await loadFS(); };
        window._copyInviteCode = function() { const code = document.getElementById('myInviteCode').value; if (code) navigator.clipboard.writeText(code).then(() => showToast('邀请码已复制')); };
        window._openSettings = function() { document.getElementById('settingsModal').classList.add('open'); updateSettingsThemeIcon(); };
        window._openProfile = function() { document.getElementById('profileModal').classList.add('open'); };
        window._openPasswordModal = function() { document.getElementById('passwordSubModal').classList.add('open'); };
        window._openSecondPwdModal = function() { document.getElementById('secondPwdSubModal').classList.add('open'); };
        window._openUsernameModal = function() { document.getElementById('usernameSubModal').classList.add('open'); };
        window._openAvatarModal = function() { document.getElementById('avatarSubModal').classList.add('open'); };
        window._openBgSettings = function() { document.getElementById('bgSubModal').classList.add('open'); };
        window._logout = function() { logout(); };
        window._toggleTheme = function() { document.body.classList.toggle('dark'); localStorage.setItem('theme', document.body.classList.contains('dark')?'dark':'light'); updateSettingsThemeIcon(); };
        window._setBg = function(bg) { userBg = bg; userBgImage = ''; localStorage.setItem('userBg', userBg); localStorage.setItem('userBgImage', ''); applyBackground(); showToast('背景已更新'); document.getElementById('bgSubModal').classList.remove('open'); };
        window._uploadBackground = async function() {
            const file = document.getElementById('backgroundUpload').files[0];
            if (!file) return showToast('请选择背景图片');
            if (file.size > 2 * 1024 * 1024) return showToast('背景图片不能超过2MB');
            const allowedTypes = ['image/png', 'image/jpeg', 'image/webp', 'image/gif'];
            if (!allowedTypes.includes(file.type)) return showToast('仅支持 PNG、JPEG、WebP、GIF 格式');
            showLoading(true);
            try {
                const reader = new FileReader();
                const dataUrl = await new Promise((res,rej)=>{ reader.onload=()=>res(reader.result); reader.onerror=rej; reader.readAsDataURL(file); });
                const res = await apiCall('/upload-background', 'POST', { data: dataUrl.split(',')[1], mime: file.type });
                userBgImage = res.data.backgroundUrl || res.backgroundUrl;
                userBg = '';
                localStorage.setItem('userBgImage', userBgImage); localStorage.setItem('userBg', '');
                applyBackground(); showToast('背景已更新'); document.getElementById('bgSubModal').classList.remove('open');
            } catch(e) { showToast('上传失败: '+e.message); } finally { showLoading(false); }
        };
        window._resetBackground = function() { userBg = 'default'; userBgImage = ''; localStorage.setItem('userBg', userBg); localStorage.setItem('userBgImage', ''); applyBackground(); showToast('背景已重置'); };
        window._updatePassword = async function() {
            const oldPwd = document.getElementById('oldPassword').value, newPwd = document.getElementById('newPassword').value, conf = document.getElementById('confirmNewPassword').value;
            if (!oldPwd||!newPwd) return showToast('请填写完整'); if (newPwd.length<6) return showToast('新密码至少6位'); if (newPwd!==conf) return showToast('两次输入不一致');
            try { await apiCall('/update-profile','POST',{oldPassword:oldPwd,newPassword:newPwd}); showToast('密码已更新'); document.getElementById('passwordSubModal').classList.remove('open'); } catch(e) { showToast(e.message); }
        };
        window._updateSecondPwd = async function() {
            const oldS = document.getElementById('oldSecondPwd').value, newS = document.getElementById('newSecondPwd').value, conf = document.getElementById('confirmNewSecondPwd').value;
            if (!oldS||!newS) return showToast('请填写完整'); if (!/^\d{6}$/.test(newS)) return showToast('新二级密码需6位数字'); if (newS!==conf) return showToast('两次输入不一致');
            try { await apiCall('/update-profile','POST',{oldSecondPassword:oldS,newSecondPassword:newS}); showToast('二级密码已更新'); document.getElementById('secondPwdSubModal').classList.remove('open'); } catch(e) { showToast(e.message); }
        };
        window._updateUsername = async function() {
            const newName = document.getElementById('newUsername').value.trim();
            if (!newName) return showToast('请输入新用户名');
            try { const res = await apiCall('/update-profile','POST',{newUsername:newName}); const token = res.data?.token || res.token; if (token) TokenManager.setToken(token); currentUser.username = res.data?.newUsername || res.newUsername; document.getElementById('profileUsername').textContent = currentUser.username; showToast('用户名已更新'); document.getElementById('usernameSubModal').classList.remove('open'); } catch(e) { showToast(e.message); }
        };
        window._uploadAvatar = async function() {
            const file = document.getElementById('avatarFileInput').files[0];
            if (!file) return showToast('请选择头像图片');
            if (file.size > 500 * 1024) return showToast('头像图片不能超过500KB');
            showLoading(true);
            try {
                const reader = new FileReader();
                const dataUrl = await new Promise((res,rej)=>{ reader.onload=()=>res(reader.result); reader.onerror=rej; reader.readAsDataURL(file); });
                const res = await apiCall('/upload-avatar','POST',{ data:dataUrl.split(',')[1], mime:file.type });
                currentUser.avatar = res.data?.avatarUrl || res.avatarUrl;
                document.getElementById('avatarImg').src = currentUser.avatar;
                document.getElementById('profileAvatarImg').src = currentUser.avatar;
                showToast('头像已更新');
            } catch(e) { showToast(e.message); } finally { showLoading(false); }
        };
        window._saveAvatarUrl = async function() {
            try {
                const url = document.getElementById('avatarUrl').value.trim();
                if (!/^https?:\/\//i.test(url)) { showToast('仅允许http或https图片地址'); return; }
                currentUser.avatar = url;
                document.getElementById('avatarImg').src = url;
                document.getElementById('profileAvatarImg').src = url;
                localStorage.setItem('user_avatar', url);
                showToast('头像已更新');
            } catch(err) { showToast(err.message); }
        };
        window._useGravatar = function() {
            if (currentUser?.email) {
                const email = currentUser.email.trim().toLowerCase();
                const hash = md5(email);
                document.getElementById('avatarUrl').value = `https://www.gravatar.com/avatar/${hash}?d=identicon`;
            } else { showToast('未绑定邮箱'); }
        };

        // ===== 登录流程 =====
        let loginLock = false;
        document.getElementById('loginNextBtn').onclick = async function() {
            if (loginLock) return;
            const acc = document.getElementById('loginUsername').value.trim();
            const pwd = document.getElementById('loginPassword').value;
            if (!acc || !pwd) return showToast('请填写账号和密码');
            loginLock = true; this.disabled = true;
            try {
                const res = await apiCall('/login', 'POST', { username: acc, password: pwd });
                const partialToken = res.data?.partialToken || res.partialToken;
                TokenManager.setPartialToken(partialToken);
                document.getElementById('loginAccountDisplay').textContent = res.data?.username || res.username;
                document.getElementById('loginStep1').classList.add('hidden');
                document.getElementById('loginStep2').classList.remove('hidden');
            } catch (e) { showToast(e.message || '登录失败'); }
            finally { loginLock = false; this.disabled = false; }
        };

        document.getElementById('loginConfirmBtn').onclick = async function() {
            if (loginLock) return;
            const sp = document.getElementById('loginSecondPwd').value.trim();
            if (!/^\d{6}$/.test(sp)) return showToast('请输入6位数字');
            loginLock = true; this.disabled = true;
            try {
                const data = await apiCall('/verify-second-password', 'POST', { secondPassword: sp });
                const fullToken = data.data?.token || data.token;
                TokenManager.setToken(fullToken);
                TokenManager.removePartialToken();
                const userInfo = data.data || data;
                currentUser = { username: userInfo.username, email: userInfo.email, role: userInfo.role, inviteCode: userInfo.inviteCode, avatar: userInfo.avatar };
                document.getElementById('loginPanel').style.display = 'none';
                document.getElementById('mainPanel').classList.add('active');
                updateUserUI();
                loadFS();
                applyBackground();
            } catch (e) { showToast(e.message || '登录失败'); }
            finally { loginLock = false; this.disabled = false; }
        };

        document.getElementById('goRegister').onclick = () => { document.getElementById('loginPanel').style.display='none'; document.getElementById('registerPanel').style.display='flex'; };
        document.getElementById('goLogin').onclick = () => { document.getElementById('registerPanel').style.display='none'; document.getElementById('loginPanel').style.display='flex'; };
        document.getElementById('loginBackBtn').onclick = () => { document.getElementById('loginStep2').classList.add('hidden'); document.getElementById('loginStep1').classList.remove('hidden'); TokenManager.removePartialToken(); };
        document.getElementById('registerBtn').onclick = async () => {
            const u = document.getElementById('regUsername').value.trim(), em = document.getElementById('regEmail').value.trim(), p = document.getElementById('regPassword').value, cp = document.getElementById('regConfirmPwd').value, sp = document.getElementById('regSecondPwd').value.trim(), csp = document.getElementById('regConfirmSecondPwd').value.trim(), inv = document.getElementById('inviteCode').value.trim();
            if (u.length<4||u.length>20) return showToast('用户名4-20字符'); if (em && !validEmail(em)) return showToast('邮箱格式不正确');
            if (p.length<6) return showToast('密码至少6位'); if (p!==cp) return showToast('两次密码不一致');
            if (!/^\d{6}$/.test(sp)) return showToast('二级密码需6位数字'); if (sp!==csp) return showToast('两次二级密码不一致'); if (!inv) return showToast('请输入邀请码');
            try { const res = await apiCall('/register','POST',{username:u,email:em,password:p,secondPassword:sp,inviteCode:inv}); alert(`注册成功！您的专属邀请码是：${res.data?.inviteCode || res.inviteCode}`); document.getElementById('goLogin').click(); } catch(e) { showToast(e.message); }
        };

        // 关闭模态框
        document.getElementById('previewClose').addEventListener('click', () => document.getElementById('previewModal').classList.remove('open'));
        document.getElementById('closeProfileModal').addEventListener('click', () => document.getElementById('profileModal').classList.remove('open'));
        document.getElementById('closeSettingsModal').addEventListener('click', () => document.getElementById('settingsModal').classList.remove('open'));
        document.getElementById('cancelPasswordBtn').addEventListener('click', () => document.getElementById('passwordSubModal').classList.remove('open'));
        document.getElementById('cancelSecondPwdBtn').addEventListener('click', () => document.getElementById('secondPwdSubModal').classList.remove('open'));
        document.getElementById('cancelUsernameBtn').addEventListener('click', () => document.getElementById('usernameSubModal').classList.remove('open'));
        document.getElementById('cancelAvatarBtn').addEventListener('click', () => document.getElementById('avatarSubModal').classList.remove('open'));
        document.getElementById('cancelBgBtn').addEventListener('click', () => document.getElementById('bgSubModal').classList.remove('open'));
        document.getElementById('sidebarToggle').addEventListener('click', () => document.getElementById('sidebar').classList.toggle('open'));

        initApp();
    })();
    </script>
