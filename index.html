<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>龙铭仓库 · 公共与私人空间</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏠</text></svg>">
    <style>
        :root {
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --hover: #f1f5f9;
            --shadow: rgba(0,0,0,0.05);
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --body-bg-image: none;
            --body-bg-color: #f0f2f5;
            --scope-public: #2563eb;
            --scope-private: #8b5cf6;
            --danger: #dc2626;
        }
        body.dark {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #e2e8f0;
            --text-secondary: #94a3b8;
            --border: #334155;
            --hover: #1e293b;
            --shadow: rgba(0,0,0,0.3);
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',Roboto,sans-serif; }
        body {
            background-image: var(--body-bg-image);
            background-color: var(--body-bg-color);
            background-size: cover;
            background-position: center;
            height:100vh; display:flex; align-items:center; justify-content:center; overflow:hidden; color:var(--text); transition:background 0.3s;
        }
        .auth-container { background:var(--card-bg); padding:2rem; border-radius:20px; box-shadow:0 20px 35px var(--shadow); width:420px; max-width:90%; display:flex; flex-direction:column; gap:1rem; }
        .auth-container h1 { text-align:center; color:var(--text); }
        .input-group { display:flex; flex-direction:column; gap:0.3rem; }
        .input-group label { font-weight:500; color:var(--text); }
        .input-group input { padding:0.8rem; border:1px solid var(--border); border-radius:10px; outline:none; transition:border 0.2s; background:var(--card-bg); color:var(--text); }
        .input-group input:focus { border-color:var(--primary); }
        .auth-btn { background:var(--primary); color:#fff; border:none; padding:0.8rem; border-radius:10px; font-weight:600; cursor:pointer; width:100%; font-size:1rem; transition:background 0.2s; }
        .auth-btn:hover { background:var(--primary-hover); }
        .auth-btn.secondary { background:var(--border); color:var(--text); }
        .auth-btn.secondary:hover { background:var(--hover); }
        .hidden { display:none !important; }
        .main-container { display:none; width:100%; height:100vh; background:transparent; flex-direction:column; }
        .main-container.active { display:flex; }
        .toolbar { background:var(--card-bg); padding:0.7rem 1.5rem; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border); flex-wrap:wrap; gap:0.5rem; position:relative; }
        .toolbar-left, .toolbar-right { display:flex; align-items:center; gap:0.5rem; flex-wrap:wrap; }
        .toolbar-btn { background:var(--primary); color:#fff; border:none; padding:0.5rem 1rem; border-radius:8px; cursor:pointer; white-space:nowrap; font-size:0.9rem; transition:background 0.2s; }
        .toolbar-btn:hover { background:var(--primary-hover); }
        .toolbar-btn.outline { background:transparent; color:var(--primary); border:1px solid var(--primary); }
        .toolbar-btn.outline:hover { background:var(--primary); color:#fff; }
        .toolbar-btn:disabled { opacity:0.5; cursor:not-allowed; }
        .scope-switch { display:flex; background:var(--border); border-radius:8px; overflow:hidden; margin-bottom:0.5rem; }
        .scope-tab { flex:1; padding:0.5rem; text-align:center; cursor:pointer; font-size:0.85rem; font-weight:500; color:var(--text-secondary); background:transparent; border:none; transition:0.2s; }
        .scope-tab.active { background:var(--primary); color:white; }
        .scope-tab.private.active { background:var(--scope-private); }
        .content-area { display:flex; flex:1; overflow:hidden; position:relative; }
        .sidebar { width:280px; background:var(--card-bg); border-right:1px solid var(--border); padding:1rem; overflow-y:auto; flex-shrink:0; transition:transform 0.3s; }
        .sidebar-toggle { display:none; background:none; border:none; font-size:1.5rem; cursor:pointer; color:var(--text); padding:0.2rem 0.5rem; }
        .file-view { flex:1; padding:1.5rem; overflow-y:auto; background:transparent; }
        .tree { list-style:none; }
        .folder-item { display:flex; align-items:center; padding:0.4rem; cursor:pointer; border-radius:6px; margin-bottom:2px; color:var(--text); }
        .folder-item:hover { background:var(--hover); }
        .sub-tree { list-style:none; padding-left:1.5rem; display:none; }
        .sub-tree.show { display:block; }
        .file-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:0.75rem; }
        .file-card { background:var(--card-bg); padding:1rem; border-radius:12px; box-shadow:0 2px 6px var(--shadow); cursor:pointer; text-align:center; position:relative; transition:background 0.15s; color:var(--text); }
        .file-card:hover { background:var(--hover); }
        .file-card.selectable { cursor:default; }
        .file-card .check-mark { position:absolute; top:5px; left:8px; width:22px; height:22px; border-radius:4px; border:2px solid var(--primary); background:transparent; display:none; align-items:center; justify-content:center; font-size:0.8rem; color:var(--primary); }
        .file-card.selectable .check-mark { display:flex; }
        .file-card.selected .check-mark { background:var(--primary); color:white; }
        .file-card .del-file { position:absolute; top:5px; right:8px; background:#fee2e2; border:none; border-radius:50%; width:22px; height:22px; display:none; align-items:center; justify-content:center; cursor:pointer; font-size:0.8rem; color:#dc2626; }
        .file-card:hover .del-file { display:flex; }
        .file-card.selectable .del-file { display:none; }
        .folder-actions { display:flex; gap:0.3rem; margin-left:auto; }
        .folder-actions button { background:none; border:none; color:var(--text-secondary); cursor:pointer; padding:0.2rem 0.3rem; border-radius:4px; }
        .folder-actions button:hover { background:var(--hover); color:var(--text); }
        .sub-item { display:flex; align-items:center; padding:0.3rem 0.5rem; cursor:pointer; border-radius:4px; margin-bottom:1px; color:var(--text); }
        .sub-item:hover { background:var(--hover); }
        .sub-item-actions button { background:none; border:none; color:var(--text-secondary); cursor:pointer; padding:0.1rem 0.3rem; border-radius:4px; font-size:0.75rem; }
        .add-sub-btn { background:none; border:none; color:var(--primary); cursor:pointer; padding:0.3rem 0.7rem; font-size:0.85rem; border-radius:6px; display:flex; align-items:center; gap:0.3rem; margin-top:0.2rem; width:100%; }
        .add-sub-btn:hover { background:var(--hover); }
        .search-box { width:100%; padding:0.5rem; border:1px solid var(--border); border-radius:8px; margin-bottom:0.5rem; outline:none; background:var(--card-bg); color:var(--text); }
        .search-results { background:var(--card-bg); border:1px solid var(--border); border-radius:8px; max-height:200px; overflow-y:auto; margin-bottom:0.5rem; }
        .search-result-item { padding:0.4rem 0.6rem; cursor:pointer; border-bottom:1px solid var(--border); font-size:0.8rem; }
        .search-result-item:hover { background:var(--hover); }
        .search-result-item .path { color:var(--text-secondary); font-size:0.7rem; }
        .search-result-item .context { color:var(--text-secondary); font-size:0.7rem; font-style:italic; }
        .modal-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:none; justify-content:center; align-items:center; z-index:1000; }
        .modal-overlay.open { display:flex; }
        .modal-content { background:var(--card-bg); border-radius:16px; padding:2rem; width:600px; max-width:90%; max-height:80vh; overflow-y:auto; position:relative; }
        .modal-content h3 { margin-bottom:1rem; color:var(--text); }
        .modal-content textarea { width:100%; height:300px; padding:0.5rem; border:1px solid var(--border); border-radius:8px; font-family:monospace; outline:none; resize:vertical; background:var(--card-bg); color:var(--text); }
        .progress-container { width:100%; background:var(--border); border-radius:10px; height:12px; margin:0.5rem 0; display:none; }
        .progress-bar { height:100%; background:var(--primary); border-radius:10px; width:0%; transition:width 0.2s; }
        .upload-status { font-size:0.8rem; color:var(--text-secondary); margin-bottom:0.25rem; }
        .loading-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.6); display:none; justify-content:center; align-items:center; z-index:2000; }
        .loading-overlay.active { display:flex; }
        .spinner { border:4px solid var(--border); border-top:4px solid var(--primary); border-radius:50%; width:40px; height:40px; animation:spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform:rotate(0deg); } 100% { transform:rotate(360deg); } }
        .avatar-img { width:38px; height:38px; border-radius:50%; object-fit:cover; cursor:pointer; }
        .avatar-img-large { width:60px; height:60px; border-radius:50%; object-fit:cover; }
        .settings-icon { background:none; border:none; cursor:pointer; font-size:1.5rem; color:var(--text); }
        .toast { position:fixed; top:20px; right:20px; background:var(--danger); color:white; padding:0.8rem 1.2rem; border-radius:8px; z-index:3000; opacity:0; transition:opacity 0.3s; }
        .toast.show { opacity:1; }
        @media (max-width:768px) {
            .sidebar { width:260px; position:absolute; z-index:10; height:100%; transform:translateX(-100%); }
            .sidebar.open { transform:translateX(0); }
            .sidebar-toggle { display:block; }
            .toolbar { padding:0.5rem; }
        }
        mark { background:#fef08a; padding:0 2px; border-radius:2px; }
    </style>
</head>
<body>

<div id="loginPanel" class="auth-container">
    <h1>🏠 龙铭仓库</h1>
    <div id="loginStep1">
        <div class="input-group"><label>用户名或邮箱</label><input type="text" id="loginUsername" autocomplete="username"></div>
        <div class="input-group"><label>密码</label><input type="password" id="loginPassword" autocomplete="current-password"></div>
        <button class="auth-btn" id="loginNextBtn">下一步</button>
        <div style="text-align:center;margin-top:0.5rem;"><a id="goRegister" style="cursor:pointer;color:var(--primary);font-size:0.9rem;">注册新账号</a></div>
    </div>
    <div id="loginStep2" class="hidden">
        <div style="text-align:center;padding:0.5rem 0;">账号 <strong id="loginAccountDisplay"></strong></div>
        <div class="input-group"><label>二级密码（6位数字）</label><input type="password" id="loginSecondPwd" maxlength="6" inputmode="numeric"></div>
        <button class="auth-btn" id="loginConfirmBtn">登录</button>
        <button class="auth-btn secondary" id="loginBackBtn">返回上一步</button>
    </div>
</div>

<div id="registerPanel" class="auth-container" style="display:none;">
    <h1>注册龙铭仓库</h1>
    <div class="input-group"><label>用户名（4-20字符）</label><input type="text" id="regUsername"></div>
    <div class="input-group"><label>邮箱（可选）</label><input type="email" id="regEmail"></div>
    <div class="input-group"><label>密码（至少6位）</label><input type="password" id="regPassword"></div>
    <div class="input-group"><label>确认密码</label><input type="password" id="regConfirmPwd"></div>
    <div class="input-group"><label>二级密码（6位数字）</label><input type="password" id="regSecondPwd" maxlength="6" inputmode="numeric"></div>
    <div class="input-group"><label>确认二级密码</label><input type="password" id="regConfirmSecondPwd" maxlength="6" inputmode="numeric"></div>
    <div class="input-group"><label>邀请码</label><input type="text" id="inviteCode"></div>
    <button class="auth-btn" id="registerBtn">注册</button>
    <div style="text-align:center;"><a id="goLogin" style="cursor:pointer;color:var(--primary);font-size:0.9rem;">返回登录</a></div>
</div>

<div id="mainPanel" class="main-container">
    <div class="toolbar">
        <div class="toolbar-left">
            <button class="sidebar-toggle" id="sidebarToggle"><i class="fas fa-bars"></i></button>
            <img id="avatarImg" class="avatar-img" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%23ddd'/%3E%3C/svg%3E" title="个人主页" />
            <button class="toolbar-btn" id="uploadBtn"><i class="fas fa-upload"></i> 上传</button>
            <button class="toolbar-btn outline" id="downloadBtn"><i class="fas fa-download"></i> 下载</button>
            <button class="toolbar-btn outline" id="refreshBtn"><i class="fas fa-sync-alt"></i> 刷新</button>
            <button class="toolbar-btn outline" id="trashBtn"><i class="fas fa-trash"></i> 回收站</button>
            <button class="toolbar-btn outline" id="exportStructureBtn" title="仅导出目录结构"><i class="fas fa-file-export"></i> 导出结构</button>
        </div>
        <div class="toolbar-right">
            <button class="settings-icon" id="settingsBtn" title="设置"><i class="fas fa-cog"></i></button>
        </div>
    </div>
    <div class="content-area">
        <div class="sidebar" id="sidebar">
            <div class="scope-switch">
                <button class="scope-tab active" data-scope="public">🌐 公共资料</button>
                <button class="scope-tab private" data-scope="private">🔒 我的空间</button>
            </div>
            <input type="text" class="search-box" id="searchInput" placeholder="🔍 搜索文件名或内容..." autocomplete="off">
            <div id="searchResults" class="search-results hidden"></div>
            <button id="addFolderBtn" class="toolbar-btn" style="margin-bottom:0.75rem;width:100%;">+ 新建文件夹</button>
            <ul class="tree" id="treeRoot"></ul>
            <div id="trashPanel" class="hidden" style="margin-top:1rem;">
                <hr style="border-color:var(--border);">
                <h4 style="display:flex;justify-content:space-between;color:var(--text);">
                    回收站
                    <button id="emptyTrashBtn" class="toolbar-btn outline" style="font-size:0.7rem;padding:0.2rem 0.5rem;">清空</button>
                </h4>
                <ul id="trashList" style="list-style:none;color:var(--text);"></ul>
            </div>
        </div>
        <div class="file-view" id="fileView">
            <h2 style="color:var(--text-secondary);">欢迎使用龙铭仓库</h2>
            <p style="color:var(--text-secondary);">请从左侧选择文件夹和子分类</p>
        </div>
    </div>
    <div class="progress-container" id="progressContainer">
        <div class="upload-status" id="uploadStatus"></div>
        <div class="progress-bar" id="progressBar"></div>
    </div>
</div>

<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>
<div class="toast" id="toast"></div>

<div class="modal-overlay" id="editorModal">
    <div class="modal-content">
        <h3>编辑文件：<span id="editorFileName" style="color:var(--primary);"></span></h3>
        <textarea id="editorTextarea"></textarea>
        <div style="display:flex;gap:1rem;margin-top:1rem;justify-content:flex-end;">
            <button class="auth-btn secondary" id="editorCancel">取消</button>
            <button class="auth-btn" id="editorSave">保存 (Ctrl+S)</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="profileModal">
    <div class="modal-content" style="width:420px;">
        <div style="text-align:center;">
            <img id="profileAvatarImg" class="avatar-img-large" src="" />
            <h3 id="profileUsername" style="margin-top:0.5rem;"></h3>
        </div>
        <hr style="border-color:var(--border);margin:1rem 0;">
        <div style="display:flex;flex-direction:column;gap:0.8rem;">
            <div style="display:flex;gap:0.5rem;align-items:center;">
                <span style="white-space:nowrap;">邀请码：</span>
                <input type="text" id="myInviteCode" readonly style="flex:1;background:var(--card-bg);border:1px solid var(--border);padding:0.5rem;border-radius:8px;color:var(--text);" />
                <button class="auth-btn" id="copyInviteBtn" style="width:auto;padding:0.5rem 1rem;">复制</button>
            </div>
            <button class="auth-btn secondary" id="profileChangePasswordBtn">修改密码</button>
            <button class="auth-btn secondary" id="profileChangeSecondPwdBtn">修改二级密码</button>
            <button class="auth-btn secondary" id="profileChangeUsernameBtn">修改用户名</button>
            <button class="auth-btn secondary" id="profileAvatarBtn">修改头像</button>
        </div>
        <button class="auth-btn secondary" id="closeProfileModal" style="margin-top:1rem;">关闭</button>
    </div>
</div>

<div class="modal-overlay" id="passwordSubModal">
    <div class="modal-content" style="width:400px;">
        <h3>修改密码</h3>
        <input type="password" id="oldPassword" placeholder="原密码"><br><br>
        <input type="password" id="newPassword" placeholder="新密码（至少6位）"><br><br>
        <input type="password" id="confirmNewPassword" placeholder="确认新密码"><br><br>
        <button class="auth-btn" id="updatePasswordBtn">更新密码</button>
        <button class="auth-btn secondary" id="cancelPasswordBtn" style="margin-top:0.5rem;">取消</button>
    </div>
</div>
<div class="modal-overlay" id="secondPwdSubModal">
    <div class="modal-content" style="width:400px;">
        <h3>修改二级密码</h3>
        <input type="password" id="oldSecondPwd" placeholder="原二级密码"><br><br>
        <input type="password" id="newSecondPwd" placeholder="新二级密码（6位数字）" maxlength="6"><br><br>
        <input type="password" id="confirmNewSecondPwd" placeholder="确认新二级密码" maxlength="6"><br><br>
        <button class="auth-btn" id="updateSecondPwdBtn">更新</button>
        <button class="auth-btn secondary" id="cancelSecondPwdBtn" style="margin-top:0.5rem;">取消</button>
    </div>
</div>
<div class="modal-overlay" id="usernameSubModal">
    <div class="modal-content" style="width:400px;">
        <h3>修改用户名</h3>
        <input type="text" id="newUsername" placeholder="新用户名（4-20字符）"><br><br>
        <button class="auth-btn" id="updateUsernameBtn">更新</button>
        <button class="auth-btn secondary" id="cancelUsernameBtn" style="margin-top:0.5rem;">取消</button>
    </div>
</div>
<div class="modal-overlay" id="avatarSubModal">
    <div class="modal-content" style="width:400px;">
        <h3>修改头像</h3>
        <input type="file" id="avatarFileInput" accept="image/*" /><br><br>
        <button class="auth-btn" id="uploadAvatarBtn">上传头像</button>
        <div style="margin-top:1rem;">
            <label>或输入图片 URL</label>
            <input type="text" id="avatarUrl" placeholder="https://example.com/avatar.jpg"><br><br>
            <button class="auth-btn" id="saveAvatarBtn">保存 URL</button>
            <button class="auth-btn secondary" id="useGravatarBtn" style="margin-top:0.5rem;">使用 Gravatar</button>
        </div>
        <button class="auth-btn secondary" id="cancelAvatarBtn" style="margin-top:1rem;">取消</button>
    </div>
</div>

<div class="modal-overlay" id="settingsModal">
    <div class="modal-content" style="width:420px;">
        <h3><i class="fas fa-cog"></i> 设置</h3>
        <hr style="border-color:var(--border);margin:1rem 0;">
        <div style="display:flex;flex-direction:column;gap:1rem;">
            <button class="auth-btn secondary" id="openBgSettingsBtn">更换背景</button>
            <div style="display:flex;justify-content:space-between;align-items:center;">
                <span>深色模式</span>
                <button id="themeToggleSettings" class="theme-toggle"><i class="fas fa-moon"></i></button>
            </div>
            <button class="auth-btn secondary" id="settingsLogoutBtn">退出登录</button>
        </div>
        <button class="auth-btn secondary" id="closeSettingsModal" style="margin-top:1rem;">关闭</button>
    </div>
</div>

<div class="modal-overlay" id="bgSubModal">
    <div class="modal-content" style="width:420px;">
        <h3>更换背景</h3>
        <label>选择预设背景：</label>
        <div style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:1rem;">
            <button class="bg-preset" data-bg="default" style="width:40px;height:40px;border-radius:8px;background:#f0f2f5;border:2px solid var(--border);"></button>
            <button class="bg-preset" data-bg="gradient1" style="width:40px;height:40px;border-radius:8px;background:linear-gradient(135deg, #667eea 0%, #764ba2 100%);"></button>
            <button class="bg-preset" data-bg="gradient2" style="width:40px;height:40px;border-radius:8px;background:linear-gradient(135deg, #f093fb 0%, #f5576c 100%);"></button>
            <button class="bg-preset" data-bg="gradient3" style="width:40px;height:40px;border-radius:8px;background:linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);"></button>
        </div>
        <label>或输入背景图片 URL：</label>
        <input type="text" id="bgImageUrl" placeholder="https://example.com/bg.jpg"><br><br>
        <button class="auth-btn" id="saveBgBtn">保存背景</button>
        <button class="auth-btn secondary" id="cancelBgBtn" style="margin-top:0.5rem;">取消</button>
    </div>
</div>

<div class="modal-overlay" id="previewModal">
    <div class="modal-content" style="text-align:center; background:var(--card-bg);">
        <span id="previewClose" style="position:absolute;right:1rem;top:1rem;cursor:pointer;font-size:1.5rem;color:var(--text);">&times;</span>
        <img id="previewImage" style="max-width:100%;max-height:70vh;" />
    </div>
</div>

<input type="file" id="hiddenFileInput" style="display:none;" multiple>

<script>
(function () {
    const API_BASE = 'https://lmck.yangui88168.workers.dev';
    const CHUNK_SIZE = 5 * 1024 * 1024;
    const MAX_FILE_SIZE = 100 * 1024 * 1024;
    const MAX_EDIT_SIZE = 500 * 1024;
    const MAX_RETRIES = 3;

    let authToken = null, partialToken = null, currentUser = null, currentRole = '';
    let currentScope = 'public';
    let currentSelection = null;
    let fsData = { public: { folders: [], trash: [] }, private: { folders: [], trash: [] } };
    let unlockedFolders = {};
    let selectMode = false;
    let selectedFiles = new Set();

    let userBg = localStorage.getItem('userBg') || '';
    let userBgImage = localStorage.getItem('userBgImage') || '';

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        clearTimeout(toast._timeout);
        toast._timeout = setTimeout(() => toast.classList.remove('show'), 3000);
    }

    try {
        const saved = sessionStorage.getItem('unlockedFolders');
        if (saved) unlockedFolders = JSON.parse(saved);
    } catch(e) {}
    function persistUnlocked() { sessionStorage.setItem('unlockedFolders', JSON.stringify(unlockedFolders)); }

    function validName(name, max = 64) { return name && String(name).trim().length > 0 && String(name).length <= max; }
    function validEmail(email) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email); }

    async function apiCall(path, method='GET', body=null) {
        let lastError;
        for (let i=0; i<MAX_RETRIES; i++) {
            try {
                const headers = { 'Content-Type': 'application/json' };
                if (authToken) headers['Authorization'] = `Bearer ${authToken}`;
                const res = await fetch(API_BASE + path, { method, headers, body: body ? JSON.stringify(body) : undefined });
                if (res.status === 401) { logout(); throw new Error('登录已过期'); }
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || `请求失败(${res.status})`);
                return data;
            } catch (err) {
                lastError = err;
                if (err.message.includes('登录已过期')) throw err;
                if (i < MAX_RETRIES - 1) await new Promise(r => setTimeout(r, 1000*(i+1)));
            }
        }
        showToast(lastError?.message || '网络错误');
        throw lastError;
    }

    function showLoading(show=true) { document.getElementById('loadingOverlay').classList.toggle('active', show); }

    function logout() {
        authToken = null; partialToken = null; currentUser = null; currentRole = '';
        document.getElementById('mainPanel').classList.remove('active');
        document.getElementById('loginPanel').style.display = 'flex';
        document.getElementById('loginStep1').classList.remove('hidden');
        document.getElementById('loginStep2').classList.add('hidden');
    }

    function updateUIByRole() {
        const isReadOnly = currentRole === 'readonly';
        document.getElementById('uploadBtn').disabled = isReadOnly;
        document.getElementById('addFolderBtn').disabled = isReadOnly;
    }

    async function loadFS() {
        showLoading(true);
        try {
            const data = await apiCall('/get-fs');
            fsData = {
                public: data.public || { folders: [], trash: [] },
                private: data.private || { folders: [], trash: [] }
            };
            renderTree();
            if (!document.getElementById('trashPanel').classList.contains('hidden')) renderTrash();
            updateUIByRole();
        } finally { showLoading(false); }
    }

    function getCurrentFS() {
        return currentScope === 'public' ? fsData.public : fsData.private;
    }

    async function saveFS() {
        const container = getCurrentFS();
        await apiCall('/update-fs', 'PUT', { scope: currentScope, folders: container.folders, trash: container.trash });
    }

    function findFolderObj(name) {
        const container = getCurrentFS();
        return container.folders.find(f => f.name === name);
    }
    function findSubObj(folder, sub) {
        const fo = findFolderObj(folder);
        return fo?.children?.find(c => c.name === sub);
    }

    async function moveToTrash(type, folder, sub, fileName) {
        await apiCall('/move-to-trash', 'POST', { scope: currentScope, type, folder, sub, fileName });
        await loadFS();
        if (currentSelection) renderFileView(currentSelection.folder, currentSelection.sub);
    }

    function highlightText(text, query) {
        if (!query) return text;
        const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
        return String(text).replace(regex, '<mark>$1</mark>');
    }

    function renderTree() {
        const tree = document.getElementById('treeRoot');
        tree.innerHTML = '';
        const container = getCurrentFS();
        if (!container.folders) return;
        const query = document.getElementById('searchInput')?.value?.toLowerCase() || '';
        container.folders.forEach(folder => {
            const li = document.createElement('li');
            const div = document.createElement('div');
            div.className = 'folder-item';
            const locked = folder.hasPassword && !unlockedFolders[`${currentScope}_${folder.name}`];
            const chevron = document.createElement('i');
            chevron.className = 'fas fa-chevron-right';
            chevron.style.cssText = 'margin-right:6px;font-size:0.75rem;';
            const nameSpan = document.createElement('span');
            nameSpan.style.flex = '1';
            const icon = document.createElement('i');
            icon.className = locked ? 'fas fa-lock' : 'fas fa-folder';
            icon.style.cssText = `margin-right:6px;color:${locked ? '#f59e0b' : (currentScope === 'public' ? '#2563eb' : '#8b5cf6')};`;
            nameSpan.appendChild(icon);
            nameSpan.innerHTML += highlightText(folder.name, query);
            const actions = document.createElement('div');
            actions.className = 'folder-actions';
            if (currentRole !== 'readonly') {
                [['fa-key','密码'],['fa-edit','重命名'],['fa-trash-alt','删除']].forEach(([ic,title],idx)=>{
                    const btn = document.createElement('button');
                    btn.title = title;
                    btn.innerHTML = `<i class="fas ${ic}"></i>`;
                    btn.onclick = e => { e.stopPropagation(); idx===0?setFolderPassword(folder.name):idx===1?renameFolder(folder.name):deleteFolder(folder.name); };
                    actions.appendChild(btn);
                });
            }
            div.appendChild(chevron); div.appendChild(nameSpan); div.appendChild(actions);
            const sub = document.createElement('ul');
            sub.className = 'sub-tree';
            if (!locked && folder.children) {
                folder.children.forEach(child => {
                    const cli = document.createElement('li');
                    cli.className = 'sub-item';
                    const sn = document.createElement('span');
                    sn.style.flex='1';
                    sn.innerHTML = '<i class="fas fa-folder-open" style="margin-right:6px;color:#64748b;font-size:0.85rem;"></i>' + highlightText(child.name, query);
                    const sa = document.createElement('div');
                    sa.className='sub-item-actions';
                    if (currentRole !== 'readonly') {
                        const rb = document.createElement('button'); rb.innerHTML='<i class="fas fa-edit"></i>';
                        rb.onclick = e => { e.stopPropagation(); renameSub(folder.name, child.name); };
                        const db = document.createElement('button'); db.innerHTML='<i class="fas fa-trash-alt"></i>';
                        db.onclick = e => { e.stopPropagation(); deleteSub(folder.name, child.name); };
                        sa.appendChild(rb); sa.appendChild(db);
                    }
                    cli.appendChild(sn); cli.appendChild(sa);
                    cli.onclick = e => { if (e.target.closest('button')) return; selectSub(folder.name, child.name, cli); };
                    sub.appendChild(cli);
                });
                if (currentRole !== 'readonly') {
                    const addBtn = document.createElement('button');
                    addBtn.className='add-sub-btn';
                    addBtn.innerHTML='<i class="fas fa-plus"></i> 新建子分类';
                    addBtn.onclick = e => { e.stopPropagation(); addSubFolder(folder.name); };
                    sub.appendChild(addBtn);
                }
            }
            div.onclick = async e => {
                if (e.target.closest('.folder-actions')) return;
                if (locked) {
                    const pwd = prompt(`请输入文件夹 "${folder.name}" 的密码：`);
                    if (pwd === null) return;
                    try {
                        await apiCall('/verify-folder-password', 'POST', { scope: currentScope, folderName: folder.name, password: pwd });
                        unlockedFolders[`${currentScope}_${folder.name}`] = true;
                        persistUnlocked();
                        renderTree();
                    } catch { showToast('密码错误'); }
                } else {
                    sub.classList.toggle('show');
                    chevron.classList.toggle('fa-rotate-90');
                }
            };
            li.appendChild(div); li.appendChild(sub); tree.appendChild(li);
        });
    }

    function selectSub(folder, sub, cli) {
        currentSelection = { folder, sub };
        document.querySelectorAll('.sub-item').forEach(el => el.style.background = '');
        cli.style.background = '#dbeafe';
        if (selectMode) toggleSelectMode(false);
        renderFileView(folder, sub);
        if (window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open');
    }

    async function setFolderPassword(name) {
        const newPwd = prompt(`设置 "${name}" 的密码（留空=清除）：`);
        if (newPwd === null) return;
        try {
            await apiCall('/set-folder-password', 'POST', { scope: currentScope, folderName: name, password: newPwd });
            const container = getCurrentFS();
            const folder = container.folders.find(f => f.name === name);
            if (folder) {
                folder.hasPassword = !!newPwd;
                const key = `${currentScope}_${name}`;
                if (newPwd) delete unlockedFolders[key];
                else unlockedFolders[key] = true;
                persistUnlocked();
            }
            renderTree();
            showToast(newPwd ? '密码已设置！' : '密码已清除！');
        } catch(e) { showToast(e.message); }
    }

    async function renameFolder(oldName) {
        if (currentRole === 'readonly') return showToast('只读账户无法重命名');
        const newName = prompt('新文件夹名称：', oldName);
        if (!newName || !validName(newName)) return;
        const container = getCurrentFS();
        if (container.folders.some(f => f.name === newName)) return showToast('名称已存在');
        try {
            await apiCall('/rename-folder', 'POST', { scope: currentScope, oldName, newName });
            await loadFS();
            if (currentSelection?.folder === oldName) {
                currentSelection.folder = newName;
                renderFileView(newName, currentSelection.sub);
            }
        } catch(e) { showToast(e.message); }
    }

    async function deleteFolder(name) {
        if (currentRole === 'readonly') return showToast('只读账户无法删除');
        if (!confirm(`删除文件夹【${name}】及其所有内容？将移入回收站。`)) return;
        await moveToTrash('folder', name);
        if (currentSelection?.folder === name) currentSelection = null;
    }

    async function renameSub(folderName, oldName) {
        if (currentRole === 'readonly') return showToast('只读账户无法重命名');
        const newName = prompt('新子分类名：', oldName);
        if (!newName || !validName(newName)) return;
        const container = getCurrentFS();
        const folder = container.folders.find(f => f.name === folderName);
        if (!folder) return;
        if (folder.children.some(c => c.name === newName)) return showToast('子分类已存在');
        try {
            await apiCall('/rename-sub', 'POST', { scope: currentScope, folder: folderName, oldSub: oldName, newSub: newName });
            await loadFS();
            if (currentSelection?.folder === folderName && currentSelection?.sub === oldName) {
                currentSelection.sub = newName;
                renderFileView(folderName, newName);
            }
        } catch(e) { showToast(e.message); }
    }

    async function deleteSub(folderName, name) {
        if (currentRole === 'readonly') return showToast('只读账户无法删除');
        if (!confirm(`删除子分类【${name}】及其所有文件？将移入回收站。`)) return;
        await moveToTrash('sub', folderName, name);
        if (currentSelection?.folder === folderName && currentSelection?.sub === name) currentSelection = null;
    }

    async function addSubFolder(folderName) {
        if (currentRole === 'readonly') return showToast('只读账户无法添加');
        const newName = prompt('子分类名称：');
        if (!newName || !validName(newName)) return;
        const container = getCurrentFS();
        const folder = container.folders.find(f => f.name === folderName);
        if (!folder) return;
        folder.children.push({ name: newName, files: [] });
        renderTree();
        try { await saveFS(); } catch(e) { showToast(e.message); }
    }

    function toggleSelectMode(enable) {
        selectMode = enable;
        const btn = document.getElementById('downloadBtn');
        if (selectMode) {
            btn.innerHTML = '<i class="fas fa-check"></i> 确认下载';
        } else {
            btn.innerHTML = '<i class="fas fa-download"></i> 下载';
        }
        document.querySelectorAll('.file-card').forEach(card => {
            if (selectMode) card.classList.add('selectable');
            else card.classList.remove('selectable', 'selected');
        });
        selectedFiles.clear();
    }

    function renderFileView(folder, sub) {
        const child = findSubObj(folder, sub);
        const fv = document.getElementById('fileView');
        fv.innerHTML = '';
        if (!child) { fv.innerHTML = '<h2 style="color:var(--text-secondary);">未找到该分类</h2>'; return; }
        const h2 = document.createElement('h2');
        h2.style.cssText = 'margin-bottom:1rem;color:var(--text);';
        const scopeLabel = currentScope === 'public' ? '🌐' : '🔒';
        h2.innerHTML = `<i class="fas fa-folder-open" style="margin-right:8px;color:var(--primary);"></i>${scopeLabel} ${sub}`;
        fv.appendChild(h2);
        if (currentRole !== 'readonly') {
            const addBtn = document.createElement('button');
            addBtn.className = 'toolbar-btn'; addBtn.style.marginBottom='1rem'; addBtn.textContent='+ 上传文件';
            addBtn.onclick = () => {
                if (!currentSelection) return showToast('请先在左侧选择一个子分类');
                document.getElementById('hiddenFileInput').click();
            };
            fv.appendChild(addBtn);
        }
        if (!child.files.length) {
            fv.innerHTML += '<p style="color:var(--text-secondary);">暂无文件，拖拽文件到此处或点击上传</p>';
            return;
        }
        const grid = document.createElement('div'); grid.className='file-grid';
        child.files.forEach((f, i) => {
            const fileName = f.name;
            const isImage = f.mime?.startsWith('image/');
            const isPDF = f.mime === 'application/pdf';
            let iconClass = 'fa-file-alt';
            if (/\.(png|jpg|jpeg|gif|bmp|svg|webp)$/i.test(fileName) || isImage) iconClass='fa-file-image';
            else if (/\.(mp4|webm|ogg|mov|avi)$/i.test(fileName)) iconClass='fa-file-video';
            else if (/\.(mp3|wav|flac|aac)$/i.test(fileName)) iconClass='fa-file-audio';
            else if (/\.pdf$/i.test(fileName) || isPDF) iconClass='fa-file-pdf';

            const card = document.createElement('div'); card.className='file-card';
            const fileKey = `${folder}/${sub}/${fileName}`;

            if (selectMode) {
                card.classList.add('selectable');
                if (selectedFiles.has(fileKey)) card.classList.add('selected');
            }

            const checkMark = document.createElement('div');
            checkMark.className = 'check-mark';
            checkMark.innerHTML = '<i class="fas fa-check"></i>';
            card.appendChild(checkMark);

            if (currentRole !== 'readonly') {
                const delBtn = document.createElement('button'); delBtn.className='del-file'; delBtn.textContent='×';
                delBtn.onclick = async e => {
                    e.stopPropagation();
                    if (!confirm(`删除文件 ${fileName}？将移入回收站。`)) return;
                    if (selectedFiles.has(fileKey)) selectedFiles.delete(fileKey);
                    await moveToTrash('file', folder, sub, fileName);
                };
                card.appendChild(delBtn);
            }

            const icon = document.createElement('i'); icon.className=`fas ${iconClass}`;
            icon.style.cssText='font-size:2rem;display:block;margin:0 auto 0.5rem;color:var(--primary);';
            const nameEl = document.createElement('span');
            nameEl.style.cssText='display:block;word-break:break-all;font-size:0.8rem;color:var(--text);';
            nameEl.textContent = fileName;
            card.appendChild(icon); card.appendChild(nameEl);

            if (currentRole !== 'readonly' && /\.(txt|md|json|csv|py|js|html|css|log|xml|yaml)$/i.test(fileName) && f.type==='file') {
                const editBtn = document.createElement('button');
                editBtn.textContent='编辑';
                editBtn.style.cssText='margin-top:4px;background:none;border:1px solid var(--primary);color:var(--primary);border-radius:4px;padding:2px 8px;font-size:0.78rem;cursor:pointer;';
                editBtn.onclick = e => { e.stopPropagation(); openEditor(folder, sub, i, fileName); };
                card.appendChild(editBtn);
            }

            card.addEventListener('click', e => {
                if (e.target.closest('button')) return;
                if (selectMode) {
                    e.stopPropagation();
                    if (selectedFiles.has(fileKey)) {
                        selectedFiles.delete(fileKey);
                        card.classList.remove('selected');
                    } else {
                        selectedFiles.add(fileKey);
                        card.classList.add('selected');
                    }
                    return;
                }
                if (isImage || isPDF) previewFile(folder, sub, f);
                else downloadFile(folder, sub, f);
            });

            grid.appendChild(card);
        });
        fv.appendChild(grid);
    }

    async function downloadFile(folder, sub, fileObj) {
        const fileName = fileObj.name;
        if (fileObj.type === 'file') {
            try {
                const headers = { 'Content-Type':'application/json' };
                if (authToken) headers['Authorization'] = `Bearer ${authToken}`;
                const url = `${API_BASE}/download-file?scope=${currentScope}&folder=${encodeURIComponent(folder)}&sub=${encodeURIComponent(sub)}&file=${encodeURIComponent(fileName)}`;
                const res = await fetch(url, { headers });
                if (!res.ok) { const err = await res.json(); showToast('下载失败: '+err.error); return; }
                const base64 = await res.text();
                const mime = fileObj.mime || 'application/octet-stream';
                const bytes = Uint8Array.from(atob(base64), c => c.charCodeAt(0));
                const blob = new Blob([bytes], { type: mime });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = fileName;
                a.click();
                URL.revokeObjectURL(a.href);
            } catch(err) { showToast('下载出错: '+err.message); }
        }
    }

    async function downloadSelectedFiles() {
        if (selectedFiles.size === 0) { showToast('未选择任何文件'); return; }
        const container = getCurrentFS();
        for (const key of selectedFiles) {
            const parts = key.split('/');
            if (parts.length < 3) continue;
            const folder = parts[0], sub = parts.slice(1, -1).join('/'), file = parts[parts.length-1];
            const subObj = container.folders.find(f => f.name === folder)?.children?.find(c => c.name === sub);
            if (!subObj) continue;
            const fileObj = subObj.files.find(f => f.name === file);
            if (fileObj) await downloadFile(folder, sub, fileObj);
        }
        toggleSelectMode(false);
        renderFileView(currentSelection.folder, currentSelection.sub);
    }

    async function previewFile(folder, sub, fileObj) {
        const mime = fileObj.mime || '';
        if (mime.startsWith('image/')) {
            const headers = { 'Content-Type':'application/json' };
            if (authToken) headers['Authorization'] = `Bearer ${authToken}`;
            const res = await fetch(`${API_BASE}/download-file?scope=${currentScope}&folder=${encodeURIComponent(folder)}&sub=${encodeURIComponent(sub)}&file=${encodeURIComponent(fileObj.name)}`, { headers });
            const base64 = await res.text();
            document.getElementById('previewImage').src = `data:${mime};base64,${base64}`;
            document.getElementById('previewModal').classList.add('open');
        } else if (mime === 'application/pdf') {
            const headers = { 'Content-Type':'application/json' };
            if (authToken) headers['Authorization'] = `Bearer ${authToken}`;
            const res = await fetch(`${API_BASE}/download-file?scope=${currentScope}&folder=${encodeURIComponent(folder)}&sub=${encodeURIComponent(sub)}&file=${encodeURIComponent(fileObj.name)}`, { headers });
            const base64 = await res.text();
            const bytes = Uint8Array.from(atob(base64), c => c.charCodeAt(0));
            const blob = new Blob([bytes], { type: 'application/pdf' });
            window.open(URL.createObjectURL(blob));
        } else {
            downloadFile(folder, sub, fileObj);
        }
    }

    document.getElementById('previewClose').addEventListener('click', () => document.getElementById('previewModal').classList.remove('open'));

    let editorCurrentSub = null, editorFileName = '';
    async function openEditor(folder, sub, idx, fileName) {
        const child = findSubObj(folder, sub);
        if (!child) return;
        try {
            const headers = { 'Content-Type':'application/json' };
            if (authToken) headers['Authorization'] = `Bearer ${authToken}`;
            const res = await fetch(`${API_BASE}/download-file?scope=${currentScope}&folder=${encodeURIComponent(folder)}&sub=${encodeURIComponent(sub)}&file=${encodeURIComponent(fileName)}`, { headers });
            if (!res.ok) { const err = await res.json(); showToast('无法读取: '+err.error); return; }
            const base64 = await res.text();
            document.getElementById('editorFileName').textContent = fileName;
            document.getElementById('editorTextarea').value = atob(base64);
            document.getElementById('editorModal').classList.add('open');
            editorCurrentSub = { folder, sub };
            editorFileName = fileName;
        } catch(e) { showToast('打开失败: '+e.message); }
    }

    document.getElementById('editorSave').addEventListener('click', async () => {
        const newContent = document.getElementById('editorTextarea').value;
        if (newContent.length > MAX_EDIT_SIZE) { showToast(`内容过大（${(newContent.length/1024).toFixed(1)}KB），限制 ${MAX_EDIT_SIZE/1024}KB`); return; }
        if (!editorCurrentSub) return;
        showLoading(true);
        try {
            await apiCall('/edit-file', 'POST', {
                scope: currentScope,
                folder: editorCurrentSub.folder,
                subFolder: editorCurrentSub.sub,
                fileName: editorFileName,
                content: newContent
            });
            document.getElementById('editorModal').classList.remove('open');
            await loadFS();
            currentSelection = editorCurrentSub;
            renderFileView(editorCurrentSub.folder, editorCurrentSub.sub);
        } catch(e) { showToast(e.message); }
        finally { showLoading(false); }
    });
    document.getElementById('editorCancel').addEventListener('click', () => document.getElementById('editorModal').classList.remove('open'));

    function updateProgress(percent, statusText = '') {
        const container = document.getElementById('progressContainer');
        const bar = document.getElementById('progressBar');
        const status = document.getElementById('uploadStatus');
        container.style.display = percent > 0 ? 'block' : 'none';
        bar.style.width = percent + '%';
        status.textContent = statusText;
    }

    async function uploadFiles(files) {
        if (!currentSelection) return showToast('请先选择子分类');
        if (currentRole === 'readonly') return showToast('只读账户无法上传');
        const { folder, sub } = currentSelection;
        const child = findSubObj(folder, sub);
        if (!child) return showToast('子分类不存在');
        showLoading(true);
        let totalProcessed = 0;
        const totalFileChunks = files.reduce((sum, file) => sum + Math.ceil(file.size / CHUNK_SIZE), 0);
        const totalFiles = files.length;
        let currentFileIndex = 0;
        try {
            for (const file of files) {
                currentFileIndex++;
                if (file.size > MAX_FILE_SIZE) { showToast(`${file.name} 超过100MB限制，已跳过`); continue; }
                const totalChunks = Math.ceil(file.size / CHUNK_SIZE);
                for (let j=0; j<totalChunks; j++) {
                    const chunk = file.slice(j * CHUNK_SIZE, Math.min((j+1)*CHUNK_SIZE, file.size));
                    const chunkData = await new Promise((res, rej) => {
                        const r = new FileReader();
                        r.onload = () => res(r.result);
                        r.onerror = () => rej(new Error('读取失败'));
                        r.readAsDataURL(chunk);
                    });
                    await apiCall('/upload-chunk', 'POST', {
                        scope: currentScope,
                        fileName: file.name, folder, subFolder: sub,
                        chunkIndex: j, totalChunks,
                        data: chunkData.split(',')[1],
                        mime: file.type
                    });
                    totalProcessed++;
                    const percent = Math.round((totalProcessed / totalFileChunks) * 100);
                    updateProgress(percent, `正在上传 ${currentFileIndex}/${totalFiles} 个文件`);
                }
                child.files.push({ name: file.name, type:'file', size: file.size, mime: file.type || 'application/octet-stream' });
            }
            await saveFS();
        } catch(e) { showToast('上传失败: '+e.message); }
        finally {
            updateProgress(0);
            showLoading(false);
            renderFileView(folder, sub);
        }
    }

    const fileViewEl = document.getElementById('fileView');
    ['dragenter','dragover','dragleave','drop'].forEach(eName => fileViewEl.addEventListener(eName, e => { e.preventDefault(); e.stopPropagation(); }));
    fileViewEl.addEventListener('dragenter', () => fileViewEl.style.outline = '2px dashed var(--primary)');
    fileViewEl.addEventListener('dragleave', e => { if (!fileViewEl.contains(e.relatedTarget)) fileViewEl.style.outline = ''; });
    fileViewEl.addEventListener('drop', async e => {
        fileViewEl.style.outline = '';
        const files = [...e.dataTransfer.files];
        if (files.length) await uploadFiles(files);
    });

    document.addEventListener('keydown', e => { if ((e.ctrlKey||e.metaKey) && e.key==='s') { e.preventDefault(); document.getElementById('editorSave')?.click(); } });

    document.getElementById('sidebarToggle').onclick = () => document.getElementById('sidebar').classList.toggle('open');

    document.querySelectorAll('.scope-tab').forEach(tab => {
        tab.addEventListener('click', async () => {
            const newScope = tab.dataset.scope;
            if (newScope === currentScope) return;
            currentScope = newScope;
            document.querySelectorAll('.scope-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentSelection = null;
            if (selectMode) toggleSelectMode(false);
            await loadFS();
            document.getElementById('fileView').innerHTML = '<h2 style="color:var(--text-secondary);">请选择文件夹</h2>';
            document.getElementById('trashPanel').classList.add('hidden');
        });
    });

    const searchInput = document.getElementById('searchInput');
    const searchResults = document.getElementById('searchResults');
    let searchTimer;

    function filterSidebarTree(query) {
        const q = query.toLowerCase();
        document.querySelectorAll('.sub-item').forEach(el => {
            el.style.display = el.textContent.toLowerCase().includes(q) ? '' : 'none';
        });
        document.querySelectorAll('.folder-item').forEach(el => {
            const text = el.textContent.toLowerCase();
            const subList = el.nextElementSibling;
            const hasVisible = subList && [...subList.querySelectorAll('.sub-item')].some(c => c.style.display !== 'none');
            el.style.display = (text.includes(q) || hasVisible) ? '' : 'none';
        });
    }

    searchInput.addEventListener('input', (e) => {
        const q = e.target.value.trim();
        filterSidebarTree(q);
        clearTimeout(searchTimer);
        if (q.length < 2) {
            searchResults.classList.add('hidden');
            searchResults.innerHTML = '';
            return;
        }
        searchTimer = setTimeout(() => performGlobalSearch(q), 300);
    });

    async function performGlobalSearch(query) {
        try {
            const res = await apiCall('/search', 'POST', { query });
            const results = res.results || [];
            if (results.length === 0) {
                searchResults.innerHTML = '<div class="search-result-item" style="color:var(--text-secondary);">无结果</div>';
            } else {
                searchResults.innerHTML = results.map(r => `
                    <div class="search-result-item" data-scope="${r.scope}" data-folder="${escapeHtml(r.folder)}" data-sub="${escapeHtml(r.sub)}" data-file="${escapeHtml(r.file)}">
                        <div><strong>${highlightText(r.file, query)}</strong> <small style="color:var(--text-secondary)">${r.scope==='public'?'公共':'私人'}</small></div>
                        <div class="path">${escapeHtml(r.folder)} / ${escapeHtml(r.sub)}</div>
                        ${r.context ? `<div class="context">${highlightText(r.context, query)}</div>` : ''}
                    </div>
                `).join('');
                searchResults.querySelectorAll('.search-result-item').forEach(item => {
                    item.addEventListener('click', async () => {
                        const scope = item.dataset.scope;
                        const folder = item.dataset.folder;
                        const sub = item.dataset.sub;
                        if (scope !== currentScope) {
                            document.querySelector(`.scope-tab[data-scope="${scope}"]`).click();
                        }
                        setTimeout(() => {
                            const subItems = document.querySelectorAll('.sub-item');
                            for (const si of subItems) {
                                if (si.textContent.includes(sub)) {
                                    si.click();
                                    break;
                                }
                            }
                        }, 300);
                        searchResults.classList.add('hidden');
                        searchInput.value = '';
                        filterSidebarTree('');
                    });
                });
            }
            searchResults.classList.remove('hidden');
        } catch (e) {
            searchResults.innerHTML = '<div class="search-result-item" style="color:red;">搜索失败</div>';
        }
    }

    function escapeHtml(text) {
        const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
        return String(text).replace(/[&<>"']/g, m => map[m]);
    }

    document.addEventListener('click', (e) => {
        if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) {
            searchResults.classList.add('hidden');
        }
    });

    document.getElementById('goRegister').onclick = () => {
        document.getElementById('loginPanel').style.display = 'none';
        document.getElementById('registerPanel').style.display = 'flex';
    };
    document.getElementById('goLogin').onclick = () => {
        document.getElementById('registerPanel').style.display = 'none';
        document.getElementById('loginPanel').style.display = 'flex';
    };
    document.getElementById('loginBackBtn').onclick = () => {
        document.getElementById('loginStep2').classList.add('hidden');
        document.getElementById('loginStep1').classList.remove('hidden');
        partialToken = null;
    };

    document.getElementById('registerBtn').onclick = async () => {
        const u = document.getElementById('regUsername').value.trim();
        const em = document.getElementById('regEmail').value.trim();
        const p = document.getElementById('regPassword').value;
        const cp = document.getElementById('regConfirmPwd').value;
        const sp = document.getElementById('regSecondPwd').value.trim();
        const csp = document.getElementById('regConfirmSecondPwd').value.trim();
        const inv = document.getElementById('inviteCode').value.trim();
        if (u.length<4||u.length>20) return showToast('用户名4-20字符');
        if (em && !validEmail(em)) return showToast('邮箱格式不正确');
        if (p.length<6) return showToast('密码至少6位');
        if (p!==cp) return showToast('两次密码不一致');
        if (!/^\d{6}$/.test(sp)) return showToast('二级密码需6位数字');
        if (sp!==csp) return showToast('两次二级密码不一致');
        if (!inv) return showToast('请输入邀请码');
        try {
            const res = await apiCall('/register', 'POST', { username:u, email:em, password:p, secondPassword:sp, inviteCode:inv });
            alert(`注册成功！您的专属邀请码是：${res.inviteCode}，请妥善保管。`);
            document.getElementById('goLogin').click();
        } catch(e) { showToast(e.message); }
    };

    document.getElementById('loginNextBtn').onclick = async () => {
        const acc = document.getElementById('loginUsername').value.trim();
        const pwd = document.getElementById('loginPassword').value;
        if (!acc || !pwd) return showToast('请填写账号和密码');
        try {
            const res = await apiCall('/login', 'POST', { username:acc, password:pwd });
            partialToken = res.partialToken;
            document.getElementById('loginAccountDisplay').textContent = res.username;
            document.getElementById('loginStep1').classList.add('hidden');
            document.getElementById('loginStep2').classList.remove('hidden');
        } catch(e) { showToast(e.message); }
    };

    document.getElementById('loginConfirmBtn').onclick = async () => {
        const sp = document.getElementById('loginSecondPwd').value.trim();
        if (!/^\d{6}$/.test(sp)) return showToast('请输入6位数字');
        try {
            const headers = { 'Content-Type':'application/json', 'Authorization':`Bearer ${partialToken}` };
            const res = await fetch(API_BASE + '/verify-second-password', { method:'POST', headers, body:JSON.stringify({ secondPassword:sp }) });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || '验证失败');
            authToken = data.token; partialToken = null;
            currentUser = { username:data.username, email:data.email, inviteCode:data.inviteCode, avatar:data.avatar || '' };
            currentRole = data.role || 'admin';
            document.getElementById('loginPanel').style.display = 'none';
            document.getElementById('mainPanel').classList.add('active');
            document.getElementById('profileUsername').textContent = data.username;
            document.getElementById('myInviteCode').value = data.inviteCode || '';
            document.getElementById('avatarImg').src = data.avatar || 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"%3E%3Ccircle cx="50" cy="50" r="50" fill="%23ddd"/%3E%3C/svg%3E';
            document.getElementById('profileAvatarImg').src = data.avatar || 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"%3E%3Ccircle cx="50" cy="50" r="50" fill="%23ddd"/%3E%3C/svg%3E';
            unlockedFolders = {};
            persistUnlocked();
            await loadFS();
            applyBackground();
        } catch(e) { showToast(e.message); }
    };

    document.getElementById('logoutBtn')?.addEventListener('click', logout);
    document.getElementById('settingsLogoutBtn').addEventListener('click', logout);

    document.getElementById('addFolderBtn').onclick = async () => {
        if (currentRole === 'readonly') return showToast('只读账户无法创建');
        const name = prompt('新文件夹名称：');
        if (!name || !validName(name)) return showToast('名称无效');
        const container = getCurrentFS();
        container.folders.push({ name, hasPassword:false, children:[] });
        renderTree();
        try { await saveFS(); } catch(e) { showToast(e.message); }
    };

    document.getElementById('refreshBtn').onclick = async () => { if (currentUser) await loadFS(); };

    document.getElementById('uploadBtn').onclick = () => {
        if (!currentSelection) return showToast('请先在左侧选择一个子分类');
        document.getElementById('hiddenFileInput').click();
    };
    document.getElementById('hiddenFileInput').onchange = async function () {
        if (!this.files.length) return;
        await uploadFiles([...this.files]);
        this.value = '';
    };

    document.getElementById('downloadBtn').addEventListener('click', () => {
        if (!currentSelection) return showToast('请先选择子分类');
        if (!selectMode) {
            toggleSelectMode(true);
            renderFileView(currentSelection.folder, currentSelection.sub);
        } else {
            downloadSelectedFiles();
        }
    });

    document.getElementById('exportStructureBtn').onclick = () => {
        const container = getCurrentFS();
        const blob = new Blob([JSON.stringify({ scope: currentScope, folders: container.folders, trash: container.trash }, null, 2)], { type:'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `structure-${currentScope}-${new Date().toISOString().slice(0,10)}.json`;
        a.click();
    };

    document.getElementById('avatarImg').addEventListener('click', () => {
        document.getElementById('profileModal').classList.add('open');
    });

    document.getElementById('settingsBtn').addEventListener('click', () => {
        document.getElementById('settingsModal').classList.add('open');
        syncThemeUI();
    });

    document.getElementById('closeProfileModal').addEventListener('click', () => document.getElementById('profileModal').classList.remove('open'));
    document.getElementById('closeSettingsModal').addEventListener('click', () => document.getElementById('settingsModal').classList.remove('open'));

    document.getElementById('profileChangePasswordBtn').addEventListener('click', () => {
        document.getElementById('passwordSubModal').classList.add('open');
    });
    document.getElementById('cancelPasswordBtn').addEventListener('click', () => document.getElementById('passwordSubModal').classList.remove('open'));
    document.getElementById('updatePasswordBtn').addEventListener('click', async () => {
        const oldPwd = document.getElementById('oldPassword').value;
        const newPwd = document.getElementById('newPassword').value;
        const conf = document.getElementById('confirmNewPassword').value;
        if (!oldPwd || !newPwd) return showToast('请填写完整');
        if (newPwd.length<6) return showToast('新密码至少6位');
        if (newPwd!==conf) return showToast('两次输入不一致');
        try {
            await apiCall('/update-profile', 'POST', { oldPassword:oldPwd, newPassword:newPwd });
            showToast('密码已更新');
            document.getElementById('passwordSubModal').classList.remove('open');
        } catch(e) { showToast(e.message); }
    });

    document.getElementById('profileChangeSecondPwdBtn').addEventListener('click', () => {
        document.getElementById('secondPwdSubModal').classList.add('open');
    });
    document.getElementById('cancelSecondPwdBtn').addEventListener('click', () => document.getElementById('secondPwdSubModal').classList.remove('open'));
    document.getElementById('updateSecondPwdBtn').addEventListener('click', async () => {
        const oldS = document.getElementById('oldSecondPwd').value;
        const newS = document.getElementById('newSecondPwd').value;
        const conf = document.getElementById('confirmNewSecondPwd').value;
        if (!oldS || !newS) return showToast('请填写完整');
        if (!/^\d{6}$/.test(newS)) return showToast('新二级密码需6位数字');
        if (newS!==conf) return showToast('两次输入不一致');
        try {
            await apiCall('/update-profile', 'POST', { oldSecondPassword:oldS, newSecondPassword:newS });
            showToast('二级密码已更新');
            document.getElementById('secondPwdSubModal').classList.remove('open');
        } catch(e) { showToast(e.message); }
    });

    document.getElementById('profileChangeUsernameBtn').addEventListener('click', () => {
        document.getElementById('usernameSubModal').classList.add('open');
    });
    document.getElementById('cancelUsernameBtn').addEventListener('click', () => document.getElementById('usernameSubModal').classList.remove('open'));
    document.getElementById('updateUsernameBtn').addEventListener('click', async () => {
        const newName = document.getElementById('newUsername').value.trim();
        if (!newName) return showToast('请输入新用户名');
        try {
            const res = await apiCall('/update-profile', 'POST', { newUsername:newName });
            authToken = res.token;
            currentUser.username = res.newUsername;
            document.getElementById('profileUsername').textContent = res.newUsername;
            showToast('用户名已更新');
            document.getElementById('usernameSubModal').classList.remove('open');
        } catch(e) { showToast(e.message); }
    });

    document.getElementById('profileAvatarBtn').addEventListener('click', () => {
        document.getElementById('avatarSubModal').classList.add('open');
    });
    document.getElementById('cancelAvatarBtn').addEventListener('click', () => document.getElementById('avatarSubModal').classList.remove('open'));
    document.getElementById('uploadAvatarBtn').addEventListener('click', async () => {
        const file = document.getElementById('avatarFileInput').files[0];
        if (!file) { showToast('请选择图片'); return; }
        if (file.size > 2 * 1024 * 1024) { showToast('头像不能超过2MB'); return; }
        showLoading(true);
        try {
            const reader = new FileReader();
            const dataUrl = await new Promise((resolve, reject) => {
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
            const base64 = dataUrl.split(',')[1];
            const res = await apiCall('/upload-avatar', 'POST', { data: base64, mime: file.type });
            document.getElementById('avatarImg').src = res.avatarUrl;
            document.getElementById('profileAvatarImg').src = res.avatarUrl;
            localStorage.setItem('userAvatar', res.avatarUrl);
            showToast('头像已更新');
        } catch(e) { showToast(e.message); }
        finally { showLoading(false); }
    });
    document.getElementById('saveAvatarBtn').addEventListener('click', () => {
        const url = document.getElementById('avatarUrl').value.trim();
        if (url) {
            document.getElementById('avatarImg').src = url;
            document.getElementById('profileAvatarImg').src = url;
            localStorage.setItem('userAvatar', url);
            showToast('头像已更新');
        }
    });
    document.getElementById('useGravatarBtn').addEventListener('click', () => {
        if (currentUser?.email) {
            const gravatarUrl = `https://www.gravatar.com/avatar/${currentUser.email}?d=identicon`;
            document.getElementById('avatarUrl').value = gravatarUrl;
        } else {
            showToast('未绑定邮箱，无法使用 Gravatar');
        }
    });

    document.getElementById('openBgSettingsBtn').addEventListener('click', () => {
        document.getElementById('bgSubModal').classList.add('open');
    });
    document.getElementById('cancelBgBtn').addEventListener('click', () => document.getElementById('bgSubModal').classList.remove('open'));
    document.getElementById('saveBgBtn').addEventListener('click', () => {
        const url = document.getElementById('bgImageUrl').value.trim();
        if (url && !url.match(/^https?:\/\//)) {
            showToast('请输入有效的 HTTP/HTTPS URL');
            return;
        }
        if (url) {
            userBgImage = url;
            userBg = '';
            localStorage.setItem('userBgImage', userBgImage);
            localStorage.setItem('userBg', '');
        }
        applyBackground();
        showToast('背景已更新');
        document.getElementById('bgSubModal').classList.remove('open');
    });
    document.querySelectorAll('.bg-preset').forEach(btn => {
        btn.addEventListener('click', () => {
            const bg = btn.dataset.bg;
            userBg = bg;
            userBgImage = '';
            localStorage.setItem('userBg', userBg);
            localStorage.setItem('userBgImage', '');
            applyBackground();
            showToast('背景已更新');
            document.getElementById('bgSubModal').classList.remove('open');
        });
    });

    function applyBackground() {
        if (userBgImage) {
            document.body.style.setProperty('--body-bg-image', `url(${userBgImage})`);
            document.body.style.setProperty('--body-bg-color', 'transparent');
        } else if (userBg && userBg !== 'default') {
            const gradients = {
                gradient1: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
                gradient2: 'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)',
                gradient3: 'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)'
            };
            document.body.style.setProperty('--body-bg-image', gradients[userBg] || 'none');
            document.body.style.setProperty('--body-bg-color', 'transparent');
        } else {
            document.body.style.setProperty('--body-bg-image', 'none');
            document.body.style.setProperty('--body-bg-color', '');
        }
    }

    document.getElementById('copyInviteBtn').addEventListener('click', () => {
        const code = document.getElementById('myInviteCode').value;
        if (code) {
            navigator.clipboard.writeText(code).then(() => showToast('邀请码已复制'));
        }
    });

    async function renderTrash() {
        const list = document.getElementById('trashList');
        list.innerHTML = '';
        const container = getCurrentFS();
        if (!container.trash || container.trash.length===0) {
            list.innerHTML = '<li style="color:var(--text-secondary);">回收站为空</li>';
            return;
        }
        container.trash.forEach((item, index) => {
            const li = document.createElement('li');
            li.style.cssText = 'display:flex;justify-content:space-between;align-items:center;padding:0.3rem 0;';
            let label = '';
            if (item.type==='file') label = `📄 ${item.file.name}`;
            else if (item.type==='sub') label = `📁 ${item.sub.name} (子分类)`;
            else label = `📂 ${item.folder.name} (文件夹)`;
            li.innerHTML = `<span>${label}</span>`;
            const actions = document.createElement('span');
            if (currentRole !== 'readonly') {
                const restoreBtn = document.createElement('button');
                restoreBtn.innerHTML = '<i class="fas fa-undo"></i>'; restoreBtn.title='恢复';
                restoreBtn.style.cssText = 'background:none;border:none;cursor:pointer;color:var(--primary);font-size:1rem;';
                restoreBtn.onclick = async () => {
                    await apiCall('/restore-from-trash','POST',{scope: currentScope, index});
                    await loadFS();
                    if (currentSelection) renderFileView(currentSelection.folder, currentSelection.sub);
                };
                const delBtn = document.createElement('button');
                delBtn.innerHTML = '<i class="fas fa-trash-alt"></i>'; delBtn.title='彻底删除';
                delBtn.style.cssText = 'background:none;border:none;cursor:pointer;color:#dc2626;font-size:1rem;';
                delBtn.onclick = async () => {
                    if (!confirm('永久删除不可恢复！')) return;
                    await apiCall('/permanent-delete','POST',{scope: currentScope, index});
                    await loadFS();
                    if (currentSelection) renderFileView(currentSelection.folder, currentSelection.sub);
                };
                actions.appendChild(restoreBtn);
                actions.appendChild(delBtn);
            }
            li.appendChild(actions);
            list.appendChild(li);
        });
    }

    document.getElementById('trashBtn').addEventListener('click', () => {
        const panel = document.getElementById('trashPanel');
        panel.classList.toggle('hidden');
        if (!panel.classList.contains('hidden')) renderTrash();
    });

    document.getElementById('emptyTrashBtn').addEventListener('click', async () => {
        if (currentRole==='readonly') return showToast('只读账户无法清空');
        if (!confirm('清空回收站将永久删除所有项目，确定？')) return;
        const container = getCurrentFS();
        const len = container.trash ? container.trash.length : 0;
        for (let i=len-1; i>=0; i--) {
            await apiCall('/permanent-delete','POST',{scope: currentScope, index:i});
        }
        await loadFS();
        if (currentSelection) renderFileView(currentSelection.folder, currentSelection.sub);
    });

    function syncThemeUI() {
        const isDark = document.body.classList.contains('dark');
        document.getElementById('themeToggleSettings').innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
    }

    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (localStorage.getItem('theme')==='dark' || (!localStorage.getItem('theme') && prefersDark)) {
        document.body.classList.add('dark');
    }
    document.getElementById('themeToggleSettings').addEventListener('click', () => {
        document.body.classList.toggle('dark');
        const isDark = document.body.classList.contains('dark');
        localStorage.setItem('theme', isDark?'dark':'light');
        syncThemeUI();
    });
    syncThemeUI();

    document.getElementById('loginPanel').style.display = 'flex';
})();
</script>
</body>
</html>
